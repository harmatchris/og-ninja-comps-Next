// ── PHOTO RESIZE UTILITY (module-level, used by SetupWizard + CoordinatorView) ──
const resizePhotoUtil=(file,cb)=>{
  const img=new Image();const url=URL.createObjectURL(file);
  img.onload=()=>{
    const s=120;const canvas=document.createElement('canvas');canvas.width=s;canvas.height=s;
    const ctx=canvas.getContext('2d');const min=Math.min(img.width,img.height);
    const sx=(img.width-min)/2,sy=(img.height-min)/2;
    ctx.drawImage(img,sx,sy,min,min,0,0,s,s);URL.revokeObjectURL(url);
    cb(canvas.toDataURL('image/jpeg',0.82));
  };img.src=url;
};
// ── SCROLL TIME PICKER ──────────────────────────────────────
const TimePicker=({value,onChange,allowDefault=false})=>{
  const {lang}=useLang();
  const ITEM_H=44;
  const opts=[];
  if(allowDefault)opts.push(null);
  for(let s=0;s<=600;s+=10)opts.push(s);
  const valToIdx=(v)=>{
    if((v==null||v===undefined)&&allowDefault)return 0;
    const base=allowDefault?1:0;
    return Math.max(0,Math.min(opts.length-1,base+Math.round((v||0)/10)));
  };
  const [activeIdx,setActiveIdx]=useState(()=>valToIdx(value));
  const scrollRef=useRef(null);
  const snapTimer=useRef(null);
  useEffect(()=>{
    const el=scrollRef.current;
    if(el)el.scrollTop=valToIdx(value)*ITEM_H;
  },[]);
  const handleScroll=()=>{
    const el=scrollRef.current;if(!el)return;
    const idx=Math.max(0,Math.min(opts.length-1,Math.round(el.scrollTop/ITEM_H)));
    setActiveIdx(idx);
    clearTimeout(snapTimer.current);
    snapTimer.current=setTimeout(()=>{
      el.scrollTo({top:idx*ITEM_H,behavior:'smooth'});
      onChange(opts[idx]);
    },150);
  };
  const fmt=(v)=>{
    if(v===null)return lang==='de'?'Standard':'Default';
    if(v===0)return lang==='de'?'Kein':'None';
    return `${Math.floor(v/60)}:${String(v%60).padStart(2,'0')}`;
  };
  return(
    <div style={{position:'relative',height:ITEM_H*5,overflow:'hidden',borderRadius:14,background:'rgba(255,255,255,.04)',border:'1px solid var(--border)',userSelect:'none',touchAction:'pan-y'}}>
      <div style={{position:'absolute',top:ITEM_H*2,left:0,right:0,height:ITEM_H,background:'rgba(255,94,58,.12)',borderTop:'1px solid rgba(255,94,58,.4)',borderBottom:'1px solid rgba(255,94,58,.4)',pointerEvents:'none',zIndex:2,borderRadius:0}}/>
      <div style={{position:'absolute',top:0,left:0,right:0,height:ITEM_H*2,background:'linear-gradient(to bottom,#0B0B14 20%,transparent)',pointerEvents:'none',zIndex:3}}/>
      <div style={{position:'absolute',bottom:0,left:0,right:0,height:ITEM_H*2,background:'linear-gradient(to top,#0B0B14 20%,transparent)',pointerEvents:'none',zIndex:3}}/>
      <div ref={scrollRef} onScroll={handleScroll}
        style={{height:'100%',overflowY:'scroll',scrollSnapType:'y mandatory',WebkitOverflowScrolling:'touch'}}>
        <div style={{height:ITEM_H*2}}/>
        {opts.map((v,i)=>(
          <div key={i} onClick={()=>{scrollRef.current?.scrollTo({top:i*ITEM_H,behavior:'smooth'});setActiveIdx(i);onChange(v);}}
            style={{height:ITEM_H,display:'flex',alignItems:'center',justifyContent:'center',scrollSnapAlign:'center',
              fontSize:i===activeIdx?20:14,fontWeight:i===activeIdx?800:400,
              color:i===activeIdx?'var(--cor)':'rgba(255,255,255,.28)',
              fontFamily:'JetBrains Mono',letterSpacing:'.05em',transition:'font-size .1s,color .1s',cursor:'pointer'}}>
            {fmt(v)}
          </div>
        ))}
        <div style={{height:ITEM_H*2}}/>
      </div>
    </div>
  );
};

// SETUP WIZARD
// ════════════════════════════════════════════════════════════
const SetupWizard=({onDone,onBack,existingId=null,initialInfo=null,initialStages=null,initialObstacles=null,initialAthletes=null})=>{
  const {t,lang}=useLang();
  const [step,setStep]=useState(0);
  const [info,setInfo]=useState(initialInfo||{name:'',date:today(),location:'',mode:'classic',numStations:2,lives:3,timeLimit:0,stageLimits:{},emoji:'🥷'});
  // Per-stage obstacles: array[stageIdx] = [{id,name,isCP,order}]
  const [stageObs,setStageObs]=useState(()=>{
    const n=initialInfo?.numStations||2;
    return Array.from({length:4},(_,i)=>{
      if(initialStages?.[i+1]?.obstacles)return Object.values(initialStages[i+1].obstacles).sort((a,b)=>a.order-b.order);
      if(initialObstacles&&i===0)return Object.values(initialObstacles).sort((a,b)=>a.order-b.order);
      return DEF_OBS.map(o=>({...o,id:uid()}));
    });
  });
  // Per-stage athletes: array[stageIdx] = [{id,name,num,cat,stageNum}]
  const [stageAths,setStageAths]=useState(()=>{
    const n=initialInfo?.numStations||2;
    return Array.from({length:4},(_,i)=>{
      if(initialStages?.[i+1]?.athletes)return Object.values(initialStages[i+1].athletes);
      if(initialAthletes&&i===0)return Object.values(initialAthletes);
      return [];
    });
  });
  const [obsStage,setObsStage]=useState(0);// which stage tab is active for obstacles
  const [athStage,setAthStage]=useState(0);// which stage tab is active for athletes
  const [newObs,setNewObs]=useState('');
  const [newAth,setNewAth]=useState({name:'',num:'1',cat:'am1',gender:'m',country:'',team:'',photo:null,stageNum:1});
  const [saving,setSaving]=useState(false);
  const [csvError,setCsvError]=useState('');
  const sI=(k,v)=>setInfo(i=>({...i,[k]:v}));
  const setStageLim=(n,v)=>setInfo(i=>({...i,stageLimits:{...(i.stageLimits||{}),[n]:v}}));
  const numSt=info.numStations||1;
  // Sync stageNum in newAth when obsStage changes
  const curAthStage=athStage;

  const resizePhoto=resizePhotoUtil;
  const addObs=()=>{
    if(!newObs.trim())return;
    const si=Math.min(obsStage,numSt-1);
    setStageObs(s=>{const n=[...s];n[si]=[...n[si],{id:uid(),name:newObs.trim(),isCP:true,order:n[si].length}];return n;});
    setNewObs('');SFX.click();
  };
  const reorderObs=arr=>{
    const si=Math.min(obsStage,numSt-1);
    setStageObs(s=>{const n=[...s];n[si]=arr.map((o,i)=>({...o,order:i}));return n;});
  };
  const removeObs=(si,id)=>{
    setStageObs(s=>{const n=[...s];n[si]=n[si].filter(o=>o.id!==id);return n;});
  };
  const toggleObsCP=(si,id)=>{
    setStageObs(s=>{const n=[...s];n[si]=n[si].map(o=>o.id===id?{...o,isCP:!o.isCP}:o);return n;});
  };
  const addAth=()=>{
    if(!newAth.name.trim())return;
    const si=Math.min(curAthStage,numSt-1);
    const stageNum=si+1;
    setStageAths(a=>{const n=[...a];n[si]=[...n[si],{id:uid(),...newAth,stageNum}];return n;});
    // Persist for autocomplete
    acSave(AC_KEYS.names,newAth.name);
    if(newAth.team)acSave(AC_KEYS.teams,newAth.team);
    if(newAth.country)acSave(AC_KEYS.countries,newAth.country);
    setNewAth(a=>({...a,name:'',num:String(stageAths[si].length+2)}));
    SFX.click();
  };
  const removeAth=(si,id)=>{
    setStageAths(a=>{const n=[...a];n[si]=n[si].filter(x=>x.id!==id);return n;});
  };
  const reorderAth=(si,arr)=>{
    setStageAths(a=>{const na=[...a];na[si]=arr;return na;});
  };

  // CSV Import
  const normalizeGender=raw=>{
    const g=(raw||'').trim().toLowerCase();
    if(['m','male','männlich','maennlich','man'].includes(g))return 'm';
    if(['w','f','female','weiblich','frau','woman'].includes(g))return 'w';
    if(['d','div','diverse','divers','non-binary','nb','x'].includes(g))return 'd';
    return 'm'; // default
  };
  const importCSV=(si,text)=>{
    setCsvError('');
    const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
    // Skip header row if it looks like a header
    const start=(lines[0]&&isNaN(lines[0].split(/[,;\t]/)[0].trim())&&!lines[0].split(/[,;\t]/)[0].trim().match(/^\d/))?1:0;
    const results=[];
    for(const line of lines.slice(start)){
      const parts=line.split(/[,;\t]/).map(s=>s.trim().replace(/^["']|["']$/g,''));
      if(parts.length<2){setCsvError(`Ungültige Zeile: ${line}`);return;}
      const [num,name,catRaw='',genderRaw='',countryRaw='',teamRaw='']=parts;
      const catLow=catRaw.toLowerCase();
      const cat=IGN_CATS.find(c=>c.id===catLow||c.name.de.toLowerCase().includes(catLow)||c.name.en.toLowerCase().includes(catLow))||IGN_CATS[9];
      const gender=normalizeGender(genderRaw);
      results.push({id:uid(),num:num||String(results.length+1),name,cat:cat.id,gender,country:countryRaw.trim(),team:teamRaw.trim(),stageNum:si+1});
    }
    if(results.length===0){setCsvError('Keine Athleten gefunden');return;}
    setStageAths(a=>{const n=[...a];n[si]=[...n[si],...results];return n;});
    SFX.complete();
    alert(`✅ ${results.length} Athleten importiert`);
  };
  const downloadCsvTemplate=()=>{
    const rows=[
      'Startnr,Name,Kategorie-ID,Geschlecht,Land,Team',
      '1,Max Muster,am1,M,CH,',
      '2,Laura Beispiel,aw1,W,AT,Team Ninja',
      '3,Robin Test,am2,D,DE,',
      '4,Anna Sample,jm1,W,CH,SwissNinja',
    ];
    const blob=new Blob([rows.join('\n')],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='athleten-vorlage.csv';a.click();URL.revokeObjectURL(url);
    SFX.click();
  };
  const handleFileImport=(si,file)=>{
    if(!file)return;
    const r=new FileReader();
    r.onload=e=>{
      if(file.name.endsWith('.csv')||file.name.endsWith('.txt')){
        importCSV(si,e.target.result);
      } else {
        // Try xlsx via SheetJS if available, else treat as CSV
        try{
          const data=new Uint8Array(e.target.result);
          const wb=XLSX.read(data,{type:'array'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const rows=XLSX.utils.sheet_to_json(ws,{header:1});
          // Skip header row if first cell looks like a header
          const start=(rows[0]&&typeof rows[0][0]==='string'&&isNaN(rows[0][0]))?1:0;
          const csvLines=rows.slice(start).map(r=>`${r[0]||''},${r[1]||''},${r[2]||''},${r[3]||''}`).join('\n');
          importCSV(si,csvLines);
        }catch{
          // Fallback: try as text
          importCSV(si,e.target.result);
        }
      }
    };
    if(file.name.endsWith('.xlsx')||file.name.endsWith('.xls')){
      r.readAsArrayBuffer(file);
    } else {
      r.readAsText(file);
    }
  };

  const save=async()=>{
    if(!info.name.trim())return;setSaving(true);
    const id=existingId||uid();
    const stagesData={};
    for(let i=0;i<numSt;i++){
      const n=i+1;
      const om={};stageObs[i].forEach((o,idx)=>{om[o.id]={...o,order:idx};});
      const am={};stageAths[i].forEach(a=>{am[a.id]=a;});
      stagesData[n]={obstacles:om,athletes:Object.keys(am).length?am:null};
    }
    // Also save first stage as global fallback for backward compat
    const om0={};stageObs[0].forEach((o,i)=>{om0[o.id]={...o,order:i};});
    const am0={};
    // Merge all athletes for global list
    for(let i=0;i<numSt;i++){stageAths[i].forEach(a=>{am0[a.id]=a;});}
    await fbSet(`ogn/${id}`,{
      info:{...info,createdAt:Date.now()},
      obstacles:om0,
      athletes:Object.keys(am0).length?am0:null,
      stages:stagesData,
    });
    setSaving(false);SFX.complete();onDone(id);
  };

  // Stage tab bar helper
  const StageTabs=({active,onChange})=>(
    <div style={{display:'flex',gap:4,overflowX:'auto',padding:'0 0 4px'}}>
      {Array.from({length:numSt},(_,i)=>(
        <button key={i} className={`chip${active===i?' active':''}`}
          style={{flexShrink:0,padding:'4px 14px',fontSize:12}}
          onClick={()=>{onChange(i);SFX.hover();}}>
          Stage {i+1}
        </button>
      ))}
    </div>
  );
  const si=Math.min(obsStage,numSt-1);
  const curObs=stageObs[si]||[];
  const asi=Math.min(athStage,numSt-1);
  const curAths=stageAths[asi]||[];

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <TopBar title={['Setup',t('obstacles'),t('athletes')][step]||'Setup'} logo={false}
        onBack={step===0?onBack:()=>setStep(s=>s-1)}
        right={<div style={{fontSize:12,color:'var(--muted)',fontWeight:700}}>{step+1}/3</div>}/>
      <div style={{display:'flex',gap:3,padding:'10px 16px',background:'rgba(255,255,255,.02)',borderBottom:'1px solid var(--border)'}}>
        {[0,1,2].map(i=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=step?'var(--cor)':'var(--border)',transition:'background .3s'}}/>)}
      </div>

      {step===0&&(
        <div className="section fade-up" style={{flex:1}}>
          <div className="lbl">{lang==='de'?'Emoji':'Emoji'}</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:4}}>
            {['🥷','🏆','🥇','🎯','💪','🔥','⚡','🌟','🏅','🤸','🧗','🦸','🐉','⚔️','🐯','🦁','🦅','💥','🌊','🎖️'].map(e=>(
              <button key={e} onClick={()=>sI('emoji',e)} style={{width:38,height:38,fontSize:20,borderRadius:10,border:`2px solid ${info.emoji===e?'var(--cor)':'var(--border)'}`,background:info.emoji===e?'rgba(255,94,58,.18)':'rgba(255,255,255,.03)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s'}}>{e}</button>
            ))}
          </div>
          <div className="lbl">{t('compName')}</div>
          <input value={info.name} onChange={e=>sI('name',e.target.value)} placeholder="OG Ninja Cup 2026" autoFocus/>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <div style={{flex:'1 1 160px',minWidth:0}}><div className="lbl" style={{marginBottom:6}}>{t('compDate')}</div><input type="date" value={info.date} onChange={e=>sI('date',e.target.value)} style={{width:'100%'}}/></div>
            <div style={{flex:'2 1 180px',minWidth:0}}><div className="lbl" style={{marginBottom:6}}>{t('compLocation')}</div><input value={info.location} onChange={e=>sI('location',e.target.value)} placeholder="Zurich Ninja Park" style={{width:'100%'}}/></div>
          </div>
          <div className="lbl">{t('mode')}</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {Object.values(MODES).map(m=><button key={m.id} className={`chip${info.mode===m.id?' active':''}`} onClick={()=>{sI('mode',m.id);SFX.hover();}}>{m.name[lang]||m.name.de}</button>)}
          </div>
          {(info.mode==='lives'||info.mode==='segliv')&&(
            <div>
              <div className="lbl" style={{marginBottom:8}}>{t('lives')}: {info.lives}</div>
              <div style={{display:'flex',gap:6}}>{[1,2,3,4,5].map(n=><button key={n} className={`chip${info.lives===n?' active':''}`} style={{flex:1,justifyContent:'center'}} onClick={()=>sI('lives',n)}>{n}❤️</button>)}</div>
            </div>
          )}
          <div className="lbl">{t('numStations')}</div>
          <div style={{display:'flex',gap:6}}>{[1,2,3,4].map(n=><button key={n} className={`chip${info.numStations===n?' active':''}`} style={{flex:1,justifyContent:'center'}} onClick={()=>sI('numStations',n)}>{n}</button>)}</div>
          <div className="lbl">⏱ {lang==='de'?'Zeitlimit':'Time limit'}{numSt>1?` (${lang==='de'?'Standard für alle Stages':'Default for all stages'})`:` ${lang==='de'?'pro Lauf':'per run'}`}</div>
          <TimePicker value={info.timeLimit||0} onChange={v=>sI('timeLimit',v||0)}/>
          {numSt>1&&(
            <div style={{background:'rgba(255,255,255,.03)',border:'1px solid var(--border)',borderRadius:12,padding:'12px 14px',display:'flex',flexDirection:'column',gap:12}}>
              <div className="lbl">⏱ {lang==='de'?'Zeitlimit pro Stage (überschreibt Standard)':'Time limit per stage (overrides default)'}</div>
              <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(numSt,2)},1fr)`,gap:12}}>
                {Array.from({length:numSt},(_,i)=>{
                  const n=i+1;
                  return(
                    <div key={n} style={{display:'flex',flexDirection:'column',gap:6}}>
                      <div style={{fontSize:12,fontWeight:700,color:'var(--cor)',textAlign:'center'}}>Stage {n}</div>
                      <TimePicker value={info.stageLimits?.[n]} onChange={v=>setStageLim(n,v)} allowDefault/>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      {step===1&&(
        <div className="section fade-up" style={{flex:1}}>
          {numSt>1&&<StageTabs active={si} onChange={setObsStage}/>}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div className="lbl">{t('obstacles')} ({curObs.length}){numSt>1&&<span style={{marginLeft:6,color:'var(--muted)',fontWeight:500}}>· Stage {si+1}</span>}</div>
            <div style={{fontSize:11,color:'var(--muted)'}}>{t('sortHint')}</div>
          </div>
          <div style={{maxHeight:310,overflowY:'auto'}}>
            <DragList items={curObs} onReorder={reorderObs} keyFn={o=>o.id}
              renderItem={(o,i)=>(
                <div style={{padding:'9px 12px',display:'flex',alignItems:'center',gap:8}}>
                  <div className="drag-handle"><I.Drag s={16}/></div>
                  <div style={{fontSize:11,color:'var(--muted)',minWidth:18,fontFamily:'JetBrains Mono',textAlign:'center'}}>{i+1}</div>
                  <div style={{flex:1,fontSize:13,fontWeight:500}}>{o.name}</div>
                  <button className={`chip${o.isCP?' active':''}`} style={{padding:'2px 9px',fontSize:10}}
                    onClick={()=>toggleObsCP(si,o.id)}>CP</button>
                  <button style={{background:'none',border:'none',cursor:'pointer',padding:4,display:'flex'}}
                    onClick={()=>removeObs(si,o.id)}><I.Trash s={13} c="var(--red)"/></button>
                </div>
              )}/>
          </div>
          {numSt>1&&<div style={{fontSize:11,color:'var(--muted)',background:'rgba(255,255,255,.03)',borderRadius:10,padding:'8px 12px'}}>
            💡 {lang==='de'?'Jede Stage hat eigene Hindernisse. Wähle oben den Stage-Tab zum Bearbeiten.':'Each stage has its own obstacles. Select a stage tab above to edit.'}
          </div>}
          <div style={{display:'flex',gap:8}}>
            <input value={newObs} onChange={e=>setNewObs(e.target.value)} placeholder={t('obsName')} onKeyDown={e=>{if(e.key==='Enter')addObs();}} style={{flex:1}}/>
            <button className="btn btn-coral" style={{padding:'10px 16px',flexShrink:0}} onClick={addObs}><I.Plus s={16}/></button>
          </div>
        </div>
      )}

      {step===2&&(
        <div className="section fade-up" style={{flex:1}}>
          {numSt>1&&<StageTabs active={asi} onChange={setAthStage}/>}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div className="lbl">{t('athletes')} ({curAths.length}){numSt>1&&<span style={{marginLeft:6,color:'var(--muted)',fontWeight:500}}>· Stage {asi+1}</span>}</div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <div style={{fontSize:11,color:'var(--muted)'}}>{t('sortHint')}</div>
              <label className="btn btn-ghost" style={{padding:'4px 10px',fontSize:11,cursor:'pointer',gap:5}}>
                <I.Upload s={12}/> CSV
                <input type="file" accept=".csv,.txt,.xlsx,.xls" style={{display:'none'}} onChange={e=>{if(e.target.files[0])handleFileImport(asi,e.target.files[0]);e.target.value='';}}/>
              </label>
              <button className="btn btn-ghost" style={{padding:'4px 10px',fontSize:11,gap:5}} onClick={downloadCsvTemplate}><I.FileText s={12}/> {lang==='de'?'Vorlage':'Template'}</button>
            </div>
          </div>
          {csvError&&<div style={{fontSize:12,color:'var(--red)',background:'rgba(255,59,48,.08)',borderRadius:8,padding:'7px 12px'}}>⚠️ {csvError}</div>}
          <div style={{fontSize:11,color:'var(--muted)',background:'rgba(255,255,255,.03)',borderRadius:8,padding:'7px 12px'}}>
            📋 CSV-Format: <code style={{fontSize:10,color:'var(--cor)'}}>Startnr, Name, Kategorie-ID, Geschlecht, Land, Team</code> — {lang==='de'?'Land/Team optional':'Country/Team optional'}
          </div>
          <div style={{maxHeight:230,overflowY:'auto'}}>
            {curAths.length===0?<EmptyState icon={<I.User s={28} c="rgba(255,255,255,.3)"/>} text="Noch keine Athleten"/>:
              <DragList items={curAths} onReorder={arr=>reorderAth(asi,arr)} keyFn={a=>a.id}
                renderItem={(a,i)=>{const cat=IGN_CATS.find(c=>c.id===a.cat);return(
                  <div style={{padding:'8px 12px',display:'flex',alignItems:'center',gap:8}}>
                    <div className="drag-handle"><I.Drag s={15}/></div>
                    <div style={{fontSize:11,color:'var(--cor)',minWidth:16,fontWeight:700}}>{i+1}</div>
                    {a.photo?<img src={a.photo} style={{width:26,height:26,borderRadius:'50%',objectFit:'cover',flexShrink:0}}/>:<div style={{width:26,height:26,borderRadius:'50%',background:'rgba(255,255,255,.06)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><I.User s={13} c="rgba(255,255,255,.35)"/></div>}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.name}</div>
                      {(a.country||a.team)&&<div style={{fontSize:10,color:'var(--muted)'}}>{[a.country,a.team].filter(Boolean).join(' · ')}</div>}
                    </div>
                    <div style={{fontSize:11,color:'var(--muted)',fontFamily:'JetBrains Mono',flexShrink:0}}>#{a.num}</div>
                    <div style={{fontSize:10,padding:'2px 7px',borderRadius:10,background:`${cat?.color||'#888'}1A`,color:cat?.color||'#888',border:`1px solid ${cat?.color||'#888'}44`,fontWeight:600,whiteSpace:'nowrap',flexShrink:0}}>{cat?.name[lang]||'?'}</div>
                    <button style={{background:'none',border:'none',cursor:'pointer',padding:4,display:'flex',flexShrink:0}} onClick={()=>removeAth(asi,a.id)}><I.Trash s={13} c="var(--red)"/></button>
                  </div>
                );}}/>
            }
          </div>
          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:14,display:'flex',flexDirection:'column',gap:8}}>
            <div style={{display:'flex',gap:8}}>
              <input value={newAth.num} onChange={e=>setNewAth(a=>({...a,num:e.target.value}))} placeholder="#" style={{width:60,flexShrink:0}}/>
              <AutocompleteInput acKey={AC_KEYS.names} value={newAth.name} onChange={e=>setNewAth(a=>({...a,name:e.target.value}))} placeholder={t('athName')} onKeyDown={e=>{if(e.key==='Enter')addAth();}}/>
            </div>
            <select value={newAth.cat} onChange={e=>setNewAth(a=>({...a,cat:e.target.value}))}>
              {IGN_CATS.map(c=><option key={c.id} value={c.id}>{c.name[lang]||c.name.de}</option>)}
            </select>
            <div style={{display:'flex',gap:6}}>
              {[['m',lang==='de'?'M (Männlich)':'M (Male)'],['w',lang==='de'?'W (Weiblich)':'W (Female)'],['d',lang==='de'?'D (Divers)':'D (Non-binary)']].map(([v,lbl])=>(
                <button key={v} className={`chip${newAth.gender===v?' active':''}`} style={{flex:1,justifyContent:'center',fontSize:11}}
                  onClick={()=>setNewAth(a=>({...a,gender:v}))}>{lbl}</button>
              ))}
            </div>
            <div style={{display:'flex',gap:8}}>
              <AutocompleteInput acKey={AC_KEYS.countries} value={newAth.country||''} onChange={e=>setNewAth(a=>({...a,country:e.target.value.toUpperCase().slice(0,3)}))} placeholder={lang==='de'?`${toFlag('CH')} Land (CH, AT…)`:`${toFlag('US')} Country (US, DE…)`} style={{flex:1}}/>
              <AutocompleteInput acKey={AC_KEYS.teams} value={newAth.team||''} onChange={e=>setNewAth(a=>({...a,team:e.target.value}))} placeholder={lang==='de'?'Team (optional)':'Team (optional)'} style={{flex:1}}/>
            </div>
            <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',padding:'7px 10px',background:'rgba(255,255,255,.03)',borderRadius:10,border:'1px solid var(--border)'}}>
              {newAth.photo
                ?<><img src={newAth.photo} style={{width:28,height:28,borderRadius:'50%',objectFit:'cover',flexShrink:0}}/><span style={{fontSize:12,flex:1}}>{lang==='de'?'Foto ändern ✓':'Change photo ✓'}</span><button style={{background:'rgba(255,59,48,.15)',border:'none',borderRadius:6,padding:'2px 8px',color:'var(--red)',fontSize:11,cursor:'pointer'}} onClick={e=>{e.preventDefault();setNewAth(a=>({...a,photo:null}));}}>{lang==='de'?'Löschen':'Remove'}</button></>
                :<><I.Camera s={17} c="var(--muted)"/><span style={{fontSize:12,flex:1,color:'var(--muted)'}}>{lang==='de'?'Foto hinzufügen (optional)':'Add photo (optional)'}</span></>
              }
              <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>{if(e.target.files[0])resizePhoto(e.target.files[0],b64=>setNewAth(a=>({...a,photo:b64})));e.target.value='';}}/>
            </label>
            <button className="btn btn-coral" style={{padding:10,gap:6}} onClick={addAth}><I.Plus s={15}/> {t('addAth')}</button>
          </div>
        </div>
      )}

      <div style={{padding:'0 16px 36px',marginTop:'auto'}}>
        {step<2
          ?<button className="btn btn-coral" style={{width:'100%',padding:15,fontSize:15}} disabled={step===0&&!info.name.trim()} onClick={()=>{SFX.click();setStep(s=>s+1);}}>{t('next')} <I.ChevR s={16}/></button>
          :<button className="btn btn-coral" style={{width:'100%',padding:15,fontSize:15}} disabled={saving} onClick={()=>{SFX.click();save();}}>{saving?'Speichern…':<><I.Check s={17}/> {t('finish')}</>}</button>
        }
      </div>
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// HOME VIEW
// ════════════════════════════════════════════════════════════
const HomeView=({onOpen,lang,setLang})=>{
  const {t}=useLang();
  const comps=useFbVal('ogn');
  const [creating,setCreating]=useState(false);
  if(creating)return<SetupWizard onDone={id=>{setCreating(false);onOpen(id);}} onBack={()=>setCreating(false)}/>;
  const list=comps?Object.entries(comps).map(([id,v])=>({id,...v})).sort((a,b)=>(b.info?.createdAt||0)-(a.info?.createdAt||0)):[];
  return(
    <div style={{minHeight:'100vh'}}>
      <TopBar title="OG Ninja Comp"
        right={<div style={{display:'flex',gap:6}}>
          <button className="btn btn-ghost" style={{padding:'5px 11px',fontSize:12,fontWeight:700}} onClick={()=>setLang(lang==='de'?'en':'de')}>{t('lang')}</button>
          <button className="btn btn-ghost" style={{padding:'7px'}} onClick={()=>window.open(`${location.href.split('?')[0]}?mode=display`,'_blank')}><I.Monitor s={15}/></button>
        </div>}/>
      {/* Hero area */}
      <div style={{padding:'32px 24px 22px',borderBottom:'1px solid var(--border)',background:'radial-gradient(ellipse at 50% -20%,rgba(255,94,58,.08) 0%,transparent 65%)'}}>
        <div style={{fontSize:11,color:'var(--cor)',letterSpacing:'.12em',textTransform:'uppercase',fontWeight:600,marginBottom:10}}>⚡ OG Games · Ninja Competition Tool</div>
        <div style={{fontSize:30,fontWeight:900,letterSpacing:'-1px',lineHeight:1.1,marginBottom:5}}>{t('competitions')}</div>
        <div style={{fontSize:13,color:'var(--muted)'}}>Firebase Live-Sync · 4 Stages · DE / EN</div>
      </div>
      <div className="section">
        <button className="btn btn-coral" style={{width:'100%',padding:12,gap:6}} onClick={()=>{SFX.click();setCreating(true);}}><I.Plus s={15}/> {t('newComp')}</button>
        {comps===undefined&&<Spinner/>}
        {comps!==undefined&&list.length===0&&<EmptyState icon="🥷" text={t('noComps')}/>}
        {list.map((c,i)=>(
          <div key={c.id} className="sh-card fade-up"
            style={{padding:16,display:'flex',flexDirection:'row',alignItems:'center',gap:14,width:'100%',animationDelay:`${i*.06}s`,cursor:'pointer',transition:'background .18s,border-color .18s'}}
            onClick={()=>{SFX.click();onOpen(c.id);}}>
            <div style={{width:44,height:44,borderRadius:13,background:'linear-gradient(135deg,var(--cor),var(--cor2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{c.info?.emoji||'🥷'}</div>
            <div style={{flex:1,textAlign:'left'}}>
              <div style={{fontWeight:800,fontSize:15,letterSpacing:'-.2px'}}>{c.info?.name||'Wettkampf'}</div>
              <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{c.info?.date||''}{c.info?.location?` · ${c.info.location}`:''}</div>
            </div>
            <div style={{fontSize:10,fontFamily:'JetBrains Mono',padding:'2px 8px',borderRadius:8,background:'rgba(255,94,58,.12)',color:'var(--cor)',letterSpacing:'.1em'}}>{c.id}</div>
            <button style={{background:'none',border:'none',cursor:'pointer',padding:'6px',display:'flex',flexShrink:0,borderRadius:8,transition:'background .15s'}}
              onClick={e=>{e.stopPropagation();if(window.confirm(`"${c.info?.name||c.id}" wirklich löschen?\n\nAlle Daten (Athleten, Läufe, Ergebnisse) werden permanent gelöscht.`)){fbRemove(`ogn/${c.id}`);SFX.fall();}}}>
              <I.Trash s={14} c="rgba(255,59,48,.45)"/>
            </button>
          </div>
        ))}
      </div>
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// COORDINATOR VIEW
// ════════════════════════════════════════════════════════════
const CoordinatorView=({compId,onBack,onStage,lang,setLang})=>{
  const {t,catName}=useLang();
  const info=useFbVal(`ogn/${compId}/info`);
  const athletes=useFbVal(`ogn/${compId}/athletes`);
  const obstacles=useFbVal(`ogn/${compId}/obstacles`);
  const stages=useFbVal(`ogn/${compId}/stages`);
  const stations=useFbVal(`ogn/${compId}/stations`);
  const completedRuns=useFbVal(`ogn/${compId}/completedRuns`);
  const [editing,setEditing]=useState(false);
  const [showQR,setShowQR]=useState(null);
  const [copied,setCopied]=useState(null);
  const [showRestart,setShowRestart]=useState(false);
  const [showAddAth,setShowAddAth]=useState(false);
  const [quickAth,setQuickAth]=useState({name:'',num:'',cat:'am1',gender:'m',country:'',team:'',photo:null});
  const [addingAth,setAddingAth]=useState(false);
  const [editObsStage,setEditObsStage]=useState(null);
  const [localObs,setLocalObs]=useState([]);
  const [newObsName,setNewObsName]=useState('');
  if(!info)return<Spinner/>;
  const openObsEdit=(n)=>{
    const stObs=stages?.[n]?.obstacles;
    const src=stObs
      ?Object.values(stObs).sort((a,b)=>a.order-b.order)
      :(obstacles?Object.values(obstacles).sort((a,b)=>a.order-b.order):[...DEF_OBS]);
    setLocalObs(src.map(o=>({...o})));
    setEditObsStage(n);setNewObsName('');
  };
  const saveObsEdit=async()=>{
    const om={};localObs.forEach((o,idx)=>{om[o.id]={...o,order:idx};});
    await fbSet(`ogn/${compId}/stages/${editObsStage}/obstacles`,om);
    setEditObsStage(null);SFX.complete();
  };
  const addLocalObs=()=>{
    const name=newObsName.trim();if(!name)return;
    setLocalObs(obs=>[...obs,{id:uid(),name,isCP:true,order:obs.length}]);
    setNewObsName('');
  };
  const moveObs=(idx,dir)=>{
    setLocalObs(obs=>{const a=[...obs];const ti=idx+dir;if(ti<0||ti>=a.length)return obs;[a[idx],a[ti]]=[a[ti],a[idx]];return a;});
  };
  const handleRestart=async()=>{
    if(!window.confirm(lang==='de'?`Alle Läufe von "${info.name}" löschen und Wettkampf neu starten?\n\nDie Athleten-Liste und Hindernisse bleiben erhalten.`:`Delete all runs from "${info.name}" and restart?\n\nAthletes and obstacles are kept.`))return;
    await fbRemove(`ogn/${compId}/completedRuns`);
    await fbRemove(`ogn/${compId}/activeRuns`);
    SFX.complete();setShowRestart(false);
  };
  const handleStageReset=async(stN,catId)=>{
    const pin=window.prompt(lang==='de'?`PIN für Stage-${stN}-Reset eingeben:`:`Enter PIN to reset Stage ${stN}:`);
    if(pin===null)return;
    if(pin!=='2021'){window.alert(lang==='de'?'Falscher PIN — Stage nicht zurückgesetzt.':'Wrong PIN — stage not reset.');return;}
    if(!window.confirm(lang==='de'?`Stage ${stN} (${IGN_CATS.find(c=>c.id===catId)?.name.de||catId}) wirklich zurücksetzen?\nAlle Läufe dieser Stage werden gelöscht.`:`Really reset Stage ${stN}?\nAll runs for this stage will be deleted.`))return;
    if(completedRuns){
      const toDelete=Object.entries(completedRuns).filter(([,r])=>r.stNum===stN||(r.catId===catId&&!r.stNum));
      const updates={};toDelete.forEach(([k])=>{updates[`ogn/${compId}/completedRuns/${k}`]=null;});
      if(Object.keys(updates).length)await db.ref().update(updates);
    }
    await fbRemove(`ogn/${compId}/activeRuns/${stN}`);
    SFX.complete();
  };
  const handleQuickAddAth=async()=>{
    if(!quickAth.name.trim())return;
    setAddingAth(true);
    const id=uid();
    const numSugg=quickAth.num||String((athList.length+1));
    const newA={id,name:quickAth.name.trim(),num:numSugg,cat:quickAth.cat,gender:quickAth.gender,country:quickAth.country||'',team:quickAth.team||'',photo:quickAth.photo||null};
    await fbSet(`ogn/${compId}/athletes/${id}`,newA);
    // Also write to all stage athlete lists so they show up in JuryApp
    const numSt2=info.numStations||1;
    const updates={};
    for(let s=1;s<=numSt2;s++){updates[`ogn/${compId}/stages/${s}/athletes/${id}`]=newA;}
    if(Object.keys(updates).length)db.ref().update(updates);
    setQuickAth(a=>({...a,name:'',num:'',country:'',team:'',photo:null}));
    setAddingAth(false);SFX.complete();
  };
  if(editing){
    const initialStages=stages||null;
    const initialObstacles=obstacles?Object.values(obstacles).sort((a,b)=>a.order-b.order):null;
    const initialAthletes=athletes?athletes:null;
    return<SetupWizard existingId={compId} initialInfo={info} initialStages={initialStages} initialObstacles={initialObstacles?{...Object.fromEntries(initialObstacles.map(o=>[o.id,o]))}:null} initialAthletes={initialAthletes} onDone={()=>setEditing(false)} onBack={()=>setEditing(false)}/>;
  }
  const numSt=info.numStations||1;
  const base=window.location.href.split('?')[0];
  const athList=athletes?Object.values(athletes):[];
  const runList=completedRuns?Object.values(completedRuns):[];
  const assignCat=(n,id)=>{fbSet(`ogn/${compId}/stations/${n}/cat`,id);SFX.click();};
  const copyUrl=(url,k)=>{navigator.clipboard?.writeText(url);setCopied(k);setTimeout(()=>setCopied(null),2200);SFX.click();};
  return(
    <div style={{minHeight:'100vh',paddingBottom:40}}>
      <TopBar title={info.name||'Wettkampf'} sub={`${compId} · ${MODES[info.mode]?.name[lang]||info.mode}`} onBack={onBack}
        right={<div style={{display:'flex',gap:6}}>
          <button className="btn btn-ghost" style={{padding:'7px'}} onClick={()=>setEditing(true)}><I.Settings s={15}/></button>
          <button className="btn btn-ghost" style={{padding:'5px 10px',fontSize:12,fontWeight:700}} onClick={()=>setLang(lang==='de'?'en':'de')}>{t('lang')}</button>
        </div>}/>
      <div className="section">
        {/* Stat badges */}
        <div style={{display:'flex',gap:8}}>
          {[{label:t('athletes'),val:athList.length},{label:'Stages',val:numSt},{label:'Läufe',val:runList.length}].map(s=>(
            <div key={s.label} className="sh-card" style={{flex:1,padding:'11px 12px',textAlign:'center'}}>
              <div style={{fontSize:18,fontWeight:900,color:'var(--cor)'}}>{s.val}</div>
              <div style={{fontSize:10,color:'var(--muted)',marginTop:2,letterSpacing:'.04em'}}>{s.label}</div>
            </div>
          ))}
        </div>


        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost" style={{flex:1,padding:12,gap:7}} onClick={()=>window.open(`${base}?mode=display&comp=${compId}`,'_blank')}>
            <I.Monitor s={15}/> {t('openDisplay')} ↗
          </button>
          <button className="btn btn-ghost" style={{padding:'12px 14px',gap:7,color:'rgba(255,150,80,.8)',borderColor:'rgba(255,120,50,.2)'}}
            title={lang==='de'?'Wettkampf neu starten':'Restart competition'}
            onClick={handleRestart}>
            <I.RefreshCw s={14} c="rgba(255,150,80,.8)"/> {lang==='de'?'Restart':'Restart'}
          </button>
        </div>
        <div className="sep"/>
        <div className="lbl">Stages — direkt starten</div>
        {Array.from({length:numSt},(_,i)=>i+1).map(n=>{
          const st=stations?.[n]||{};const cat=IGN_CATS.find(c=>c.id===st.cat);
          const doneIds=new Set(runList.filter(r=>r.catId===st.cat).map(r=>r.athleteId));
          const total=athList.filter(a=>a.cat===st.cat).length;
          const done=doneIds.size;
          const url=`${base}?station=${n}&comp=${compId}`;
          return(
            <div key={n} className="sh-card fade-up" style={{padding:16,display:'flex',flexDirection:'column',gap:10}}>
              {/* Stage header */}
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <div style={{width:44,height:44,borderRadius:12,background:'linear-gradient(135deg,var(--cor),var(--cor2))',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:20,color:'#fff',boxShadow:'0 4px 14px rgba(255,94,58,.26)',flexShrink:0}}>{n}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15}}>Stage {n}</div>
                  {cat
                    ?<div style={{fontSize:12,marginTop:2,display:'flex',alignItems:'center',gap:6}}>
                       <span style={{color:cat.color,fontWeight:600}}>{catName(cat)}</span>
                       <span style={{color:'var(--muted)'}}>{done}/{total} Läufe</span>
                     </div>
                    :<div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Kategorie wählen → Stage starten</div>}
                </div>
                <button className="btn btn-ghost" style={{padding:'7px',color:editObsStage===n?'var(--cor)':'currentColor',borderColor:editObsStage===n?'rgba(255,94,58,.4)':'var(--border)'}} title={lang==='de'?`Stage ${n} Hindernisse bearbeiten`:`Edit Stage ${n} obstacles`} onClick={()=>editObsStage===n?setEditObsStage(null):openObsEdit(n)}><I.Edit s={14} c={editObsStage===n?'var(--cor)':'currentColor'}/></button>
                <button className="btn btn-ghost" style={{padding:'7px'}} onClick={()=>setShowQR(showQR===n?null:n)}><I.QR s={15}/></button>
                {st.cat&&<button className="btn btn-ghost" style={{padding:'7px',color:'rgba(255,120,60,.7)',borderColor:'rgba(255,100,40,.2)'}} title={lang==='de'?`Stage ${n} zurücksetzen (PIN)`:`Reset Stage ${n} (PIN)`} onClick={()=>handleStageReset(n,st.cat)}><I.RefreshCw s={14} c="rgba(255,120,60,.7)"/></button>}
              </div>
              {/* QR panel */}
              {showQR===n&&(
                <div className="scale-in" style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,background:'rgba(255,255,255,.03)',borderRadius:12,padding:16}}>
                  <QRCodeComp url={url} size={140}/>
                  <div style={{fontSize:10,color:'var(--muted)',textAlign:'center',wordBreak:'break-all',maxWidth:260}}>{url}</div>
                  <button className="btn btn-ghost" style={{fontSize:12,padding:'6px 14px',gap:6}} onClick={()=>copyUrl(url,n)}>
                    {copied===n?<><I.Check s={13} c="var(--green)"/> {t('copied')}</>:<><I.Download s={13}/> {t('copyUrl')}</>}
                  </button>
                </div>
              )}
              {/* Category chips */}
              <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                {IGN_CATS.map(c=>(
                  <button key={c.id} className={`chip${st.cat===c.id?' active':''}`}
                    style={{fontSize:10,padding:'3px 9px',...(st.cat===c.id?{background:`${c.color}1A`,borderColor:`${c.color}55`,color:c.color}:{})}}
                    onClick={()=>assignCat(n,c.id)}>{c.name[lang]}</button>
                ))}
              </div>
              {/* BIG START BUTTON */}
              <button className="btn btn-coral" style={{width:'100%',padding:14,fontSize:15,gap:8,marginTop:2}}
                onClick={()=>{SFX.click();onStage(n);}}>
                <I.Play s={16}/> Stage {n} starten
              </button>
              {/* ── Inline obstacle editor ── */}
              {editObsStage===n&&(
                <div className="scale-in" style={{background:'rgba(255,255,255,.03)',border:'1px solid var(--border)',borderRadius:12,padding:12,display:'flex',flexDirection:'column',gap:7}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
                    <div className="lbl">{lang==='de'?'Hindernisse bearbeiten':'Edit obstacles'}</div>
                    <div style={{fontSize:11,color:'var(--muted)'}}>{localObs.length} · {localObs.filter(o=>o.isCP).length} CPs</div>
                  </div>
                  {localObs.map((o,idx)=>(
                    <div key={o.id} style={{display:'flex',alignItems:'center',gap:5,background:'rgba(255,255,255,.03)',borderRadius:8,padding:'4px 6px'}}>
                      <button style={{background:'none',border:'none',cursor:'pointer',padding:'2px 3px',fontSize:14,lineHeight:1,color:o.isCP?'var(--cor)':'var(--dim)',flexShrink:0}} onClick={()=>setLocalObs(obs=>obs.map((x,i)=>i===idx?{...x,isCP:!x.isCP}:x))} title={o.isCP?'CP aktiv — klicken zum deaktivieren':'Kein CP — klicken zum aktivieren'}>{o.isCP?'🎯':'◯'}</button>
                      <input value={o.name} onChange={e=>setLocalObs(obs=>obs.map((x,i)=>i===idx?{...x,name:e.target.value}:x))} style={{flex:1,padding:'4px 7px',fontSize:12,borderRadius:7,minWidth:0}}/>
                      <button style={{background:'none',border:'none',cursor:'pointer',padding:'2px 4px',color:'var(--muted)',fontSize:13,opacity:idx===0?.25:1}} onClick={()=>moveObs(idx,-1)} disabled={idx===0}>↑</button>
                      <button style={{background:'none',border:'none',cursor:'pointer',padding:'2px 4px',color:'var(--muted)',fontSize:13,opacity:idx===localObs.length-1?.25:1}} onClick={()=>moveObs(idx,1)} disabled={idx===localObs.length-1}>↓</button>
                      <button style={{background:'rgba(255,59,48,.1)',border:'none',borderRadius:6,padding:'3px 7px',color:'var(--red)',cursor:'pointer',fontSize:11,flexShrink:0}} onClick={()=>setLocalObs(obs=>obs.filter((_,i)=>i!==idx))}><I.X s={11} c="var(--red)"/></button>
                    </div>
                  ))}
                  <div style={{display:'flex',gap:6,borderTop:'1px solid var(--border)',paddingTop:8,marginTop:1}}>
                    <input value={newObsName} onChange={e=>setNewObsName(e.target.value)} placeholder={lang==='de'?'Neues Hindernis…':'New obstacle…'} style={{flex:1,padding:'6px 10px',fontSize:12,borderRadius:8}} onKeyDown={e=>{if(e.key==='Enter')addLocalObs();}}/>
                    <button className="btn btn-ghost" style={{padding:'6px 11px',fontSize:12,gap:4,flexShrink:0}} onClick={addLocalObs}><I.Plus s={12}/>{lang==='de'?'Hinzu':'Add'}</button>
                  </div>
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn btn-coral" style={{flex:1,padding:'10px',fontSize:13,gap:6}} onClick={saveObsEdit}><I.Check s={13}/>{lang==='de'?'Speichern':'Save'}</button>
                    <button className="btn btn-ghost" style={{padding:'10px 14px',fontSize:12}} onClick={()=>setEditObsStage(null)}>{lang==='de'?'Abbrechen':'Cancel'}</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}

        {/* ── Quick add athlete mid-competition ── */}
        <div className="sep" style={{marginTop:8}}/>
        <button className="btn btn-ghost" style={{width:'100%',padding:'11px 14px',gap:8,justifyContent:'space-between',fontSize:14}}
          onClick={()=>{setShowAddAth(v=>!v);SFX.hover();}}>
          <span style={{display:'flex',alignItems:'center',gap:8}}><I.Plus s={15}/> {lang==='de'?'Athleten nachträglich hinzufügen':'Add athlete during competition'}</span>
          <span style={{fontSize:11,color:'var(--muted)'}}>{showAddAth?'▲':'▼'}</span>
        </button>
        {showAddAth&&(
          <div className="scale-in" style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:14,display:'flex',flexDirection:'column',gap:8}}>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:2}}>💡 {lang==='de'?'Athlete wird sofort in alle Stages eingetragen':'Athlete is added to all stages immediately'}</div>
            <div style={{display:'flex',gap:8}}>
              <input value={quickAth.num} onChange={e=>setQuickAth(a=>({...a,num:e.target.value}))} placeholder="#" style={{width:60,flexShrink:0}}/>
              <input value={quickAth.name} onChange={e=>setQuickAth(a=>({...a,name:e.target.value}))} placeholder={lang==='de'?'Name':'Name'} onKeyDown={e=>{if(e.key==='Enter')handleQuickAddAth();}} autoFocus/>
            </div>
            <select value={quickAth.cat} onChange={e=>setQuickAth(a=>({...a,cat:e.target.value}))}>
              {IGN_CATS.map(c=><option key={c.id} value={c.id}>{c.name[lang]||c.name.de}</option>)}
            </select>
            <div style={{display:'flex',gap:6}}>
              {[['m',lang==='de'?'M':'M'],['w',lang==='de'?'W':'W'],['d','D']].map(([v,lbl])=>(
                <button key={v} className={`chip${quickAth.gender===v?' active':''}`} style={{flex:1,justifyContent:'center',fontSize:11}}
                  onClick={()=>setQuickAth(a=>({...a,gender:v}))}>{lbl}</button>
              ))}
            </div>
            <div style={{display:'flex',gap:8}}>
              <input value={quickAth.country||''} onChange={e=>setQuickAth(a=>({...a,country:e.target.value}))} placeholder={lang==='de'?'Land (z.B. CH)':'Country'} style={{flex:1}}/>
              <input value={quickAth.team||''} onChange={e=>setQuickAth(a=>({...a,team:e.target.value}))} placeholder="Team" style={{flex:1}}/>
            </div>
            <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',padding:'7px 10px',background:'rgba(255,255,255,.03)',borderRadius:10,border:'1px solid var(--border)'}}>
              {quickAth.photo
                ?<><img src={quickAth.photo} style={{width:28,height:28,borderRadius:'50%',objectFit:'cover',flexShrink:0}}/><span style={{fontSize:12,flex:1}}>{lang==='de'?'Foto ändern ✓':'Change photo ✓'}</span><button style={{background:'rgba(255,59,48,.15)',border:'none',borderRadius:6,padding:'2px 8px',color:'var(--red)',fontSize:11,cursor:'pointer'}} onClick={e=>{e.preventDefault();setQuickAth(a=>({...a,photo:null}));}}>{lang==='de'?'Löschen':'Remove'}</button></>
                :<><I.Camera s={17} c="var(--muted)"/><span style={{fontSize:12,flex:1,color:'var(--muted)'}}>{lang==='de'?'Foto (optional)':'Photo (optional)'}</span></>
              }
              <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>{if(e.target.files[0])resizePhotoUtil(e.target.files[0],b64=>setQuickAth(a=>({...a,photo:b64})));e.target.value='';}}/>
            </label>
            <button className="btn btn-coral" style={{padding:'10px',gap:6}} disabled={addingAth||!quickAth.name.trim()} onClick={handleQuickAddAth}>
              {addingAth?'Speichern…':<><I.Plus s={15}/> {lang==='de'?'Athlet hinzufügen':'Add Athlete'}</>}
            </button>
          </div>
        )}
        {/* Athlete list quick overview */}
        {athList.length>0&&(
          <div style={{marginTop:4}}>
            <div className="lbl" style={{marginBottom:6}}>{lang==='de'?`Athleten (${athList.length})`:`Athletes (${athList.length})`}</div>
            <div style={{maxHeight:180,overflowY:'auto',display:'flex',flexDirection:'column',gap:4}}>
              {athList.sort((a,b)=>(+a.num||0)-(+b.num||0)).map(a=>{
                const cat=IGN_CATS.find(c=>c.id===a.cat);
                return(
                  <div key={a.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',background:'rgba(255,255,255,.03)',borderRadius:8}}>
                    {a.photo?<img src={a.photo} style={{width:22,height:22,borderRadius:'50%',objectFit:'cover',flexShrink:0}}/>:null}
                    <div style={{flex:1,fontSize:13,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.name}</div>
                    <div style={{fontSize:11,color:'var(--muted)',fontFamily:'JetBrains Mono'}}>#{a.num}</div>
                    {cat&&<div style={{fontSize:10,padding:'1px 7px',borderRadius:8,background:`${cat.color}1A`,color:cat.color,border:`1px solid ${cat.color}44`,fontWeight:600,flexShrink:0}}>{cat.name[lang]||'?'}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// JURY — WAIT
// ════════════════════════════════════════════════════════════
const JuryWait=({cat,queue,obstacles,onStart,compId})=>{
  const {t,catName,lang}=useLang();
  const obstArr=obstacles?Object.values(obstacles).sort((a,b)=>a.order-b.order):[];
  const cpObst=obstArr.filter(o=>o.isCP);
  const [localQ,setLocalQ]=useState(null);
  const effectiveQ=localQ||queue;
  const reorderQ=arr=>{
    setLocalQ(arr);
    // persist order to firebase
    const updates={};arr.forEach((a,i)=>{updates[`ogn/${compId}/athletes/${a.id}/queueOrder`]=i;});
    if(Object.keys(updates).length)db.ref().update(updates);
  };
  const next=effectiveQ[0];
  return(
    <div style={{display:'flex',flexDirection:'column',gap:0}}>
      {cat&&<div style={{padding:'14px 16px 0',display:'flex',justifyContent:'center'}}><div className="live-badge"><div className="live-dot"/>{catName(cat)}</div></div>}
      {!next&&<EmptyState icon={<I.CheckCircle s={28} c="var(--green)"/>} text={t('allDone')}/>}
      {next&&(
        <div className="section" style={{gap:10}}>
          {/* Next athlete hero card */}
          <div className="sh-card fade-up" style={{padding:20,position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 50% 110%,rgba(255,94,58,.06) 0%,transparent 65%)',pointerEvents:'none'}}/>
            <div className="lbl" style={{marginBottom:10}}>{t('nextAthlete')}</div>
            <div style={{fontSize:26,fontWeight:900,letterSpacing:'-.6px',marginBottom:4}}>{next.country&&<span style={{marginRight:6}}>{toFlag(next.country)}</span>}{next.name}</div>
            <div style={{fontSize:13,color:'var(--muted)',fontFamily:'JetBrains Mono',marginBottom:14}}>#{next.num}{next.team&&<span style={{marginLeft:8,color:'var(--cor2)',fontWeight:600,fontFamily:'Inter,sans-serif',fontSize:12}}>{next.team}</span>}</div>
            {/* CP obstacle name pills */}
            <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:8}}>
              {cpObst.map(o=><div key={o.id} className="cp-pill future">{o.name}</div>)}
            </div>
            <div style={{fontSize:11,color:'var(--muted)'}}>{cpObst.length} Checkpoints · {obstArr.length} Hindernisse</div>
            <button className="btn btn-coral" style={{width:'100%',padding:15,fontSize:16,gap:8,marginTop:16}} onClick={()=>{SFX.click();onStart(next);}}>
              <I.Play s={16}/> {t('startCountdown')}
            </button>
          </div>
          {/* Queue drag-reorder — ALL positions including #1 */}
          {effectiveQ.length>1&&(
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div className="lbl">Startreihenfolge</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>{t('sortHint')}</div>
              </div>
              <DragList items={effectiveQ} onReorder={arr=>reorderQ(arr)} keyFn={a=>a.id}
                renderItem={(a,i)=>(
                  <div style={{padding:'9px 12px',display:'flex',alignItems:'center',gap:8,background:i===0?'rgba(52,199,89,.04)':'transparent',borderRadius:i===0?10:0}}>
                    <div className="drag-handle"><I.Drag s={15}/></div>
                    <div style={{fontSize:11,color:i===0?'var(--green)':'var(--cor)',minWidth:20,fontWeight:800,fontFamily:'JetBrains Mono'}}>{i+1}</div>
                    <div style={{flex:1,fontSize:13,fontWeight:600}}>{a.name}</div>
                    {i===0&&<div style={{fontSize:9,padding:'2px 7px',borderRadius:6,background:'rgba(52,199,89,.15)',color:'var(--green)',fontWeight:800,border:'1px solid rgba(52,199,89,.3)',letterSpacing:'.05em'}}>NEXT</div>}
                    <div style={{fontSize:11,color:'var(--muted)',fontFamily:'JetBrains Mono'}}>#{a.num}</div>
                  </div>
                )}/>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// JURY — COUNTDOWN
// ════════════════════════════════════════════════════════════
const JuryCountdown=({onGo})=>{
  const {lang}=useLang();
  const [count,setCount]=useState(3);const [go,setGo]=useState(false);
  useEffect(()=>{
    // countdown(cb) now calls cb(goTime) exactly when GO tone fires at 3s
    SFX.countdown(goTime=>{setGo(true);onGo(goTime);});
    // Tick display at 1-second intervals matching the beeps
    const t1=setTimeout(()=>setCount(2),1000),
          t2=setTimeout(()=>setCount(1),2000),
          t3=setTimeout(()=>setCount(0),3000);
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);};
  },[]);
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(11,11,20,.97)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:18,zIndex:200}}>
      <div key={go?'go':count} className="timer-grad" style={{fontSize:go?100:172,letterSpacing:'-6px',animation:'scaleIn .3s cubic-bezier(.16,1,.3,1)',lineHeight:1}}>
        {go||count===0?'GO!':(count)}
      </div>
      <div style={{fontSize:16,color:'rgba(255,255,255,.8)',letterSpacing:'.18em',textTransform:'uppercase',fontWeight:700}}>
        {go?(lang==='de'?'⚡ LOS!':'⚡ GO!'):(lang==='de'?'Bereit machen…':'Get ready…')}
      </div>
      {!go&&(
        <div style={{display:'flex',gap:10,marginTop:6}}>
          {[3,2,1].map(n=>(
            <div key={n} style={{width:10,height:10,borderRadius:'50%',
              background:count<=n?'var(--cor)':'rgba(255,255,255,.15)',
              boxShadow:count<=n?'0 0 8px var(--cor)':'none',
              transition:'all .3s'}}/>
          ))}
        </div>
      )}
      {go&&<div className="live-dot" style={{marginTop:4,width:14,height:14}}/>}
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// JURY — ACTIVE RUN
// ════════════════════════════════════════════════════════════
const JuryActive=({compId,stNum,athlete,obstacles,info,lives,activeFalls,startPerf:startPerfProp,onFall,onComplete,onStop})=>{
  const {lang}=useLang();
  const obstArr=obstacles?Object.values(obstacles).sort((a,b)=>a.order-b.order):[];
  const cpObst=obstArr.filter(o=>o.isCP);
  const [doneCP,setDoneCP]=useState([]);
  const doneCPRef=useRef([]);
  const livesRef=useRef(lives);
  useEffect(()=>{livesRef.current=lives;},[lives]);
  // startPerf comes from JuryApp — captured at the exact moment GO tone fired
  const [startPerf]=useState(()=>startPerfProp!=null?startPerfProp:performance.now());
  const [startEpoch]=useState(()=>Date.now());
  // Split time display after each CP
  const [lastSplit,setLastSplit]=useState(null);
  const [showSplit,setShowSplit]=useState(false);
  const splitTimerRef=useRef();
  // Protest / complaint flag
  const [protested,setProtested]=useState(false);
  useEffect(()=>{return()=>{if(splitTimerRef.current)clearTimeout(splitTimerRef.current);};},[]);
  const el=useTimer(true,startPerf);
  const [flash,setFlash]=useState(false);
  const hasLives=info.mode==='lives'||info.mode==='segliv';
  // Per-stage time limit overrides the global default
  const effectiveLimit=info.stageLimits?.[stNum]!=null?info.stageLimits[stNum]:(info.timeLimit||0);
  const timeLimitMs=effectiveLimit*1000;
  const remaining=timeLimitMs>0?Math.max(0,timeLimitMs-el):null;
  const timeCritical=remaining!==null&&remaining<15000;

  useEffect(()=>{
    fbSet(`ogn/${compId}/activeRuns/${stNum}`,{athleteId:athlete.id,athleteName:athlete.name,startEpoch,catId:athlete.cat||null,doneCP:[],livesLeft:lives});
    return()=>fbRemove(`ogn/${compId}/activeRuns/${stNum}`);
  },[]);
  useEffect(()=>{if(doneCP.length>0)fbUpdate(`ogn/${compId}/activeRuns/${stNum}`,{doneCP,livesLeft:lives});},[doneCP,lives]);

  // Auto-stop when time limit expires
  useEffect(()=>{
    if(!timeLimitMs)return;
    const t=setTimeout(()=>{
      const dc=doneCPRef.current;
      const lct=dc.length>0?dc[dc.length-1].time:timeLimitMs;
      onStop({doneCP:dc,time:lct,currentTime:timeLimitMs,lives:livesRef.current,reason:'timeout'});
    },timeLimitMs);
    return()=>clearTimeout(t);
  },[]);

  const nextIdx=doneCP.length,nextCp=cpObst[nextIdx],allDone=doneCP.length>=cpObst.length;

  const handleCP=()=>{
    if(allDone)return;
    SFX.checkpoint();setFlash(true);setTimeout(()=>setFlash(false),320);
    const t=Math.round(performance.now()-startPerf);
    const nd=[...doneCP,{obsId:nextCp.id,name:nextCp.name,time:t}];
    doneCPRef.current=nd;setDoneCP(nd);
    // Show split time for 3.5s
    setLastSplit({name:nextCp.name,time:t,idx:nd.length,total:cpObst.length});
    setShowSplit(true);
    if(splitTimerRef.current)clearTimeout(splitTimerRef.current);
    splitTimerRef.current=setTimeout(()=>setShowSplit(false),3500);
    if(nd.length>=cpObst.length)setTimeout(()=>onComplete({doneCP:nd,finalTime:nd[nd.length-1].time,lives,protested}),400);
  };
  const handleFall=()=>{
    SFX.fall();
    const elapsed=Math.round(performance.now()-startPerf);
    const lct=doneCP.length>0?doneCP[doneCP.length-1].time:elapsed;
    onFall({doneCP,time:lct,currentTime:elapsed,lives,pendingFallIdx:nextIdx,protested});
  };
  const handleStop=()=>{
    SFX.fall();
    const elapsed=Math.round(performance.now()-startPerf);
    const lct=doneCP.length>0?doneCP[doneCP.length-1].time:elapsed;
    onStop({doneCP,time:lct,currentTime:elapsed,lives,reason:'stopped',protested});
  };

  return(
    <div style={{display:'flex',flexDirection:'column',minHeight:'calc(100vh - 56px)',paddingBottom:16}}>
      {/* Athlete card with gradient glow + timer */}
      <div className="sh-card" style={{margin:'12px 16px',padding:'18px 20px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 50% 110%,rgba(255,94,58,.09) 0%,transparent 58%)',pointerEvents:'none'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
          <div>
            <div style={{fontSize:22,fontWeight:800,letterSpacing:'-.5px'}}>{athlete.name}</div>
            <div style={{fontSize:12,color:'var(--muted)',marginTop:3,fontFamily:'JetBrains Mono'}}>#{athlete.num}</div>
          </div>
          {hasLives&&(
            <div style={{textAlign:'right'}}>
              <div className="lbl" style={{marginBottom:7}}>{lang==='de'?'Leben':'Lives'}</div>
              <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
                {Array.from({length:info.lives||3},(_,i)=>(
                  <div key={i} style={{width:11,height:11,borderRadius:'50%',background:i<lives?'var(--cor)':'rgba(255,255,255,.12)',boxShadow:i<lives?'0 0 8px rgba(255,94,58,.6)':'none',transition:'all .3s'}}/>
                ))}
              </div>
            </div>
          )}
        </div>
        <div style={{textAlign:'center'}}>
          <div className="lbl" style={{marginBottom:10}}>{lang==='de'?'Laufzeit':'Run time'}</div>
          <div className="timer-grad" style={{fontSize:54}}>{fmtMs(el)}</div>
          {nextCp&&!allDone&&<div style={{fontSize:12,color:'var(--muted)',marginTop:8}}>{nextCp.name} · CP {nextIdx+1}/{cpObst.length}</div>}
          {remaining!==null&&(
            <div style={{marginTop:10,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              <span style={{fontSize:11,color:'var(--muted)',letterSpacing:'.08em',textTransform:'uppercase'}}>⏱ {lang==='de'?'Verbleibend':'Remaining'}</span>
              <span style={{fontFamily:'JetBrains Mono',fontWeight:700,fontSize:16,color:timeCritical?'var(--red)':'var(--gold)',animation:timeCritical?'pulse 1s infinite':undefined}}>{fmtMs(remaining).slice(0,-4)}</span>
            </div>
          )}
        </div>
      </div>

      {/* Split time flash after each CP */}
      {showSplit&&lastSplit&&(
        <div style={{margin:'0 16px 6px',padding:'10px 16px',borderRadius:14,
          background:'rgba(52,199,89,.1)',border:'1px solid rgba(52,199,89,.3)',
          display:'flex',justifyContent:'space-between',alignItems:'center',
          animation:'fadeUp .22s ease'}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--green)'}}>
            ✓ {lastSplit.name} · CP {lastSplit.idx}/{lastSplit.total}
          </div>
          <div className="timer-grad" style={{fontSize:20}}>{fmtMs(lastSplit.time)}</div>
        </div>
      )}

      {/* CP pills track with fall indicators */}
      <div style={{padding:'4px 16px 8px'}}>
        <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
          {cpObst.map((o,i)=>{
            const done=doneCP.some(d=>d.obsId===o.id);
            const cur=!done&&i===nextIdx;
            const nxt=!done&&!cur&&i===nextIdx+1;
            const fallsHere=(activeFalls||[]).filter(f=>f.obsIdx===i).length;
            return(
              <div key={o.id} style={{position:'relative',display:'inline-flex'}}>
                <div className={`cp-pill ${done?'done':cur?'cur':nxt?'next':'future'}`}>
                  {done&&<span style={{fontSize:10,marginRight:3}}>✓</span>}{o.name}
                </div>
                {fallsHere>0&&<span style={{position:'absolute',top:-7,right:-5,background:'var(--red)',color:'#fff',fontSize:9,fontWeight:800,borderRadius:8,padding:'1px 5px',lineHeight:1.5,minWidth:16,textAlign:'center'}}>{'💔'.repeat(Math.min(fallsHere,3))}{fallsHere>3?`×${fallsHere}`:''}</span>}
              </div>
            );
          })}
        </div>
      </div>

      {/* THE BIG CHECKPOINT BUTTON */}
      {!allDone&&(
        <div style={{padding:'6px 16px',flex:1,display:'flex',flexDirection:'column',gap:8}}>
          <button className={`big-cp-btn${flash?' flash':''}`} style={{flex:1,minHeight:185}} onClick={handleCP}>
            <div style={{fontSize:42}}>🥷</div>
            <div>CHECKPOINT</div>
            {nextCp&&<div style={{fontSize:15,opacity:.82,fontWeight:600,letterSpacing:'.01em'}}>{nextCp.name}</div>}
          </button>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-fall" style={{flex:1,padding:14,fontSize:13,gap:7}} onClick={handleFall}>
              <I.X s={14}/> {lang==='de'?'Fall':'Fall'}
            </button>
            <button className="btn btn-fall" style={{flex:1,padding:14,fontSize:13,gap:7,borderColor:'rgba(255,200,0,.2)',color:'rgba(255,200,80,.8)'}} onClick={handleStop}>
              🛑 {lang==='de'?'Abbrechen':'Stop run'}
            </button>
          </div>
          <button className="btn btn-ghost" style={{width:'100%',padding:10,fontSize:12,gap:6,
            ...(protested?{background:'rgba(255,200,0,.12)',color:'var(--gold)',borderColor:'rgba(255,200,0,.35)'}:{})}}
            onClick={()=>{setProtested(p=>!p);SFX.hover();}}>
            <I.Flag s={13} c={protested?'var(--gold)':'currentColor'}/> {protested
              ?(lang==='de'?'Reklamation gesetzt – nochmal drücken zum aufheben':'Protest marked – tap to remove')
              :(lang==='de'?'Reklamation markieren':'Mark protest')}
          </button>
        </div>
      )}

      {allDone&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,padding:'0 16px'}}>
          <div style={{fontSize:52}}>🏁</div>
          <div style={{fontSize:22,fontWeight:900,color:'var(--green)'}}>{lang==='de'?'Ziel erreicht!':'Finish!'}</div>
          <div className="timer-grad" style={{fontSize:38}}>{fmtMs(doneCP[doneCP.length-1]?.time||el)}</div>
          <button className="btn btn-coral" style={{width:'100%',padding:15,fontSize:16,gap:8,marginTop:8}}
            onClick={()=>onComplete({doneCP,finalTime:doneCP[doneCP.length-1]?.time||Math.round(performance.now()-startPerf),lives})}>
            <I.Flag s={16}/> {lang==='de'?'Bestätigen':'Confirm finish'}
          </button>
        </div>
      )}
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// JURY — FALL MODAL  (timer keeps running behind this overlay)
// ════════════════════════════════════════════════════════════
const FallModal=({athlete,doneCP,cpObst,obstArr=[],currentTime,mode,lives,onConfirm,onUseLive,onCancel})=>{
  const {t,lang}=useLang();
  const [selCount,setSelCount]=useState(doneCP.length);
  const hasLives=mode==='lives'||mode==='segliv';
  // Show last 2 + next 2 CPs around current done count
  const rangeStart=Math.max(0,doneCP.length-2);
  const rangeEnd=Math.min(cpObst.length,doneCP.length+2);
  const visible=cpObst.slice(rangeStart,rangeEnd);
  // Official time = time of selected CP, or currentTime if none/future
  const getTime=sc=>{
    if(sc===0)return currentTime;
    const ct=doneCP[sc-1]?.time;
    return ct!=null?ct:currentTime;
  };
  const officialTime=getTime(selCount);
  // Obstacle selector: show all obstacles after last confirmed CP
  const lastCpOrder=selCount>0?(cpObst[selCount-1]?.order??-1):-1;
  const candidateObst=obstArr.filter(o=>o.order>lastCpOrder);
  const [fellAtObstId,setFellAtObstId]=useState(()=>candidateObst[0]?.id??null);
  useEffect(()=>{setFellAtObstId(candidateObst[0]?.id??null);},[selCount]);
  const fellAtObst=obstArr.find(o=>o.id===fellAtObstId)||null;
  return(
    <div className="modal-overlay">
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div style={{textAlign:'center',marginBottom:4}}><div style={{fontSize:40}}>💥</div></div>
        <div style={{fontSize:20,fontWeight:900,textAlign:'center',marginBottom:4}}>{t('fallTitle')}</div>
        <div style={{fontSize:13,color:'var(--muted)',textAlign:'center',marginBottom:14}}>{athlete.name} · #{athlete.num}</div>
        <div className="sh-card" style={{padding:14,marginBottom:12}}>
          <div className="lbl" style={{marginBottom:8}}>{lang==='de'?'Letzter erreichter Checkpoint':'Last checkpoint reached'}</div>
          <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:12}}>
            <button className={`chip${selCount===0?' active':''}`}
              style={{justifyContent:'space-between',padding:'9px 14px'}}
              onClick={()=>setSelCount(0)}>
              <span style={{fontWeight:600,color:'var(--text)'}}>⛔ {lang==='de'?'Kein Checkpoint':'No checkpoint'}</span>
              <span style={{fontSize:11,color:'var(--muted)',fontFamily:'JetBrains Mono'}}>—</span>
            </button>
            {visible.map((cp,vi)=>{
              const idx=rangeStart+vi;
              const count=idx+1;
              const reached=count<=doneCP.length;
              const cpTime=reached?doneCP[idx]?.time:null;
              const isSel=selCount===count;
              return(
                <button key={cp.id} className={`chip${isSel?' active':''}`}
                  style={{justifyContent:'space-between',padding:'9px 14px',opacity:reached?1:.62,
                    background:isSel?'rgba(255,94,58,.22)':reached?'rgba(255,255,255,.06)':'rgba(255,255,255,.02)'}}

// JURY — STOP MODAL (timer keeps running behind overlay)
// ════════════════════════════════════════════════════════════
const StopModal=({athlete,doneCP,cpObst,obstArr=[],time,reason,onConfirm,onCancel})=>{
  const {lang}=useLang();
  const [selCount,setSelCount]=useState(doneCP.length);
  const isTimeout=reason==='timeout';
  // Official time = selected CP's recorded time, else fallback
  const getSelTime=()=>{
    if(selCount===0)return time;
    const ct=doneCP[selCount-1]?.time;
    return ct!=null?ct:time;
  };
  // Obstacle selector: obstacles after last confirmed CP
  const lastCpOrder=selCount>0?(cpObst[selCount-1]?.order??-1):-1;
  const candidateObst=obstArr.filter(o=>o.order>lastCpOrder);
  const [fellAtObstId,setFellAtObstId]=useState(()=>candidateObst[0]?.id??null);
  useEffect(()=>{setFellAtObstId(candidateObst[0]?.id??null);},[selCount]);
  const fellAtObst=obstArr.find(o=>o.id===fellAtObstId)||null;
  return(
    <div className="modal-overlay">
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div style={{textAlign:'center',marginBottom:12}}>
          <div style={{fontSize:42,marginBottom:6}}>{isTimeout?'⏱':'🛑'}</div>
          <div style={{fontSize:20,fontWeight:900}}>{isTimeout?(lang==='de'?'Zeitlimit erreicht':'Time limit reached'):(lang==='de'?'Lauf abbrechen':'Stop run')}</div>
          <div style={{fontSize:13,color:'var(--muted)',marginTop:4}}>{athlete.name} · #{athlete.num}</div>
        </div>
        <div className="sh-card" style={{padding:14,marginBottom:12}}>
          <div className="lbl" style={{marginBottom:8}}>{lang==='de'?'Letzter erreichter Checkpoint':'Last checkpoint reached'}</div>
          <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:12}}>
            <button className={`chip${selCount===0?' active':''}`}
              style={{justifyContent:'space-between',padding:'9px 14px'}}
              onClick={()=>setSelCount(0)}>
              <span style={{fontWeight:600,color:'var(--text)'}}>⛔ {lang==='de'?'Keiner':'None'}</span>
              <span style={{fontSize:11,color:'var(--muted)',fontFamily:'JetBrains Mono'}}>—</span>
            </button>
            {cpObst.map((cp,i)=>{
              const reached=i<doneCP.length;
              const cpTime=reached?doneCP[i]?.time:null;
              const isSel=selCount===i+1;
              return(
                <button key={cp.id} className={`chip${isSel?' active':''}`}
                  style={{justifyContent:'space-between',padding:'9px 14px',opacity:reached?1:.62,
                    background:isSel?'rgba(255,94,58,.22)':reached?'rgba(255,255,255,.06)':'rgba(255,255,255,.02)'}}
                  onClick={()=>setSelCount(i+1)}>
                  <span style={{fontWeight:600,color:'var(--text)'}}>
                    {reached&&<span style={{color:'var(--cor)',marginRight:5,fontSize:10}}>✓</span>}
                    {i+1}. {cp.name}
                  </span>
                  <span style={{fontSize:12,fontFamily:'JetBrains Mono',fontWeight:700,color:reached?'var(--text)':'var(--dim)',flexShrink:0,marginLeft:8}}>
                    {cpTime!=null?fmtMs(cpTime):'—'}
                  </span>
                </button>
              );
            })}
          </div>
          {obstArr.length>0&&(
            <div style={{marginBottom:12}}>
              <div className="lbl" style={{marginBottom:7}}>{lang==='de'?'Weitest erreichtes Hindernis:':'Furthest obstacle reached:'}</div>
              {candidateObst.length===0
                ?<div style={{fontSize:12,color:'var(--dim)',padding:'4px 0'}}>—</div>
                :<div style={{display:'flex',gap:5,overflowX:'auto',paddingBottom:2}}>
                  {candidateObst.map(o=>(
                    <button key={o.id} className={`chip${fellAtObstId===o.id?' active':''}`}
                      style={{flexShrink:0,fontSize:12,padding:'5px 11px',justifyContent:'center'}}
                      onClick={()=>setFellAtObstId(o.id)}>
                      {o.name}
                    </button>
                  ))}
                </div>
              }
            </div>
          )}
          <div className="lbl" style={{marginBottom:4}}>{lang==='de'?'Offizielle Zeit':'Official time'}</div>
          <div className="timer-grad" style={{fontSize:32}}>{fmtMs(getSelTime())}</div>
        </div>
        <div style={{fontSize:11,color:'var(--muted)',textAlign:'center',marginBottom:10}}>
          {lang==='de'?'Checkpoint korrigieren falls Jury-Fehler passiert ist.':'Adjust checkpoint if jury error occurred.'}
        </div>
        <button className="btn btn-coral" style={{width:'100%',padding:13,gap:8,marginBottom:8}}
          onClick={()=>onConfirm({selCount,time:getSelTime(),fellAtObst})}>
          <I.Check s={15}/> {lang==='de'?'Bestätigen & speichern':'Confirm & save'}
        </button>
        <button className="btn btn-ghost" style={{width:'100%',padding:12}} onClick={onCancel}>
          ↩ {lang==='de'?'Zurück zum Lauf':'Back to run'}
        </button>
      </div>
    </div>
  );
};

    </div>
  );
};

// REGELWERK
// ════════════════════════════════════════════════════════════
const Regelwerk=()=>{
  const {lang}=useLang();
  const rw=lang==='en'?REGELWERK_EN:REGELWERK_DE;
  const [query,setQuery]=useState('');
  const q=query.trim().toLowerCase();
  const hl=(html)=>{
    if(!q)return html;
    const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return html.replace(re,'<mark>$1</mark>');
  };
  const matches=(ch)=>{
    if(!q)return true;
    return ch.title.toLowerCase().includes(q)||ch.content.toLowerCase().includes(q)||ch.nr.toLowerCase().includes(q);
  };
  const matchCount=(ch)=>{
    if(!q)return 0;
    const text=(ch.title+' '+ch.content).toLowerCase();
    let count=0,pos=0;
    while((pos=text.indexOf(q,pos))!==-1){count++;pos+=q.length;}
    return count;
  };
  const totalMatches=rw.reduce((s,c)=>s+matchCount(c),0);
  const visible=rw.filter(matches);
  return(
    <div style={{paddingBottom:80}}>
      <div className="rw-search-bar">
        <div style={{position:'relative'}}>
          <input value={query} onChange={e=>setQuery(e.target.value)}
            placeholder={lang==='de'?'Regelwerk durchsuchen…':'Search rulebook…'}
            style={{paddingLeft:36,borderRadius:10,fontSize:13}}/>
          <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',fontSize:14,opacity:.5}}>🔍</span>
          {query&&<button onClick={()=>setQuery('')} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:16,opacity:.5,color:'var(--text)',padding:'0 2px'}}>✕</button>}
        </div>
        {q&&<div style={{marginTop:8,display:'flex',gap:6,alignItems:'center'}}>
          <span className="rw-match-badge">🔍 {totalMatches} {lang==='de'?'Treffer':'matches'} · {visible.length} {lang==='de'?'Kapitel':'chapters'}</span>
          {visible.length===0&&<span style={{fontSize:11,color:'var(--muted)'}}>{lang==='de'?'Keine Ergebnisse':'No results'}</span>}
        </div>}
      </div>
      {visible.map(ch=>{
        const cnt=matchCount(ch);
        const hasMatch=cnt>0&&!!q;
        return(
          <details key={ch.nr} className="rw-chapter" open={hasMatch||undefined}>
            <summary>
              <span style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{color:ch.color,fontWeight:800,fontSize:15,minWidth:20}}>{ch.nr}</span>
                <span>{ch.title}</span>
                {hasMatch&&<span className="rw-match-badge">{cnt}</span>}
              </span>
            </summary>
            <div className="rw-body" dangerouslySetInnerHTML={{__html:hl(ch.content)}}/>
          </details>
        );
      })}
      {visible.length===0&&q&&<div style={{padding:'40px 24px',textAlign:'center',color:'var(--muted)',fontSize:13}}>{lang==='de'?`Kein Ergebnis für «${q}»`:`No results for "${q}"`}</div>}
    </div>
  );
};
