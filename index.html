// RESULTS VIEW
// ════════════════════════════════════════════════════════════
const ResultsView=({compId,athletes})=>{
  const {t,lang,catName}=useLang();
  const runs=useFbVal(`ogn/${compId}/completedRuns`);
  const [selCat,setSelCat]=useState(null);
  const [selStage,setSelStage]=useState(null); // null = Gesamt (all), number = specific stage
  const runList=runs?Object.values(runs):[];
  const athMap=athletes||{};
  const catsWithRuns=IGN_CATS.filter(c=>runList.some(r=>r.catId===c.id));
  useEffect(()=>{if(!selCat&&catsWithRuns.length>0)setSelCat(catsWithRuns[0].id);},[catsWithRuns.length]);
  // Reset stage selection when category changes
  useEffect(()=>{setSelStage(null);},[selCat]);
  // Stage numbers that have runs for the selected category
  const stageNums=selCat?[...new Set(runList.filter(r=>r.catId===selCat&&r.stNum!=null).map(r=>r.stNum))].sort((a,b)=>a-b):[];
  const multiStage=stageNums.length>1;
  const ranked=selCat?(selStage!=null?computeRankedStage(runList,selCat,selStage):computeRanked(runList,selCat)):[];
  const medals=['🥇','🥈','🥉'];
  const exportAll=(format='csv')=>{
    if(format==='csv'){
      const rows=[['Platz','#','Name','Team','Land','Kategorie','CPs','Zeit','Ergebnis','Reklamation']];
      catsWithRuns.forEach(c=>{
        const r=computeRanked(runList,c.id);
        if(!r.length)return;
        r.forEach((run,i)=>{
          const a=athMap[run.athleteId]||{name:run.athleteName||'?',num:'?'};
          const ergebnis=run.status==='complete'?'Buzzer':run.fellAt?.name?`Failed @ ${run.fellAt.name}`:(run.status||'DNF');
          rows.push([i+1,`"${a.num}"`,`"${a.name}"`,`"${a.team||''}"`,`"${a.country||''}"`,`"${catName(c)}"`,run.doneCP?.length||0,run.status==='complete'?fmtMs(run.finalTime):'',`"${ergebnis}"`,run.protested?'🚩':'']);
        });
      });
      const csv=rows.map(r=>r.join(',')).join('\n');
      const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=`ninja-results-${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url);
      SFX.complete();
    } else {
      // Text share fallback
      const lines=['OG Ninja Comp · Ergebnisse',new Date().toLocaleDateString(),''];
      catsWithRuns.forEach(c=>{const r=computeRanked(runList,c.id);if(!r.length)return;lines.push(`\n=== ${catName(c)} ===`);r.forEach((run,i)=>{const a=athMap[run.athleteId]||{name:run.athleteName||'?',num:'?'};lines.push(`${i+1}. #${a.num} ${a.name}  |  ${run.doneCP?.length||0} CPs  |  ${fmtMs(run.finalTime)}${run.protested?' 🚩':''}`);});});
      const text=lines.join('\n');
      if(navigator.share)navigator.share({title:'OG Ninja Results',text});else if(navigator.clipboard){navigator.clipboard.writeText(text);alert('📋 In Zwischenablage kopiert');}
      SFX.complete();
    }
  };
  return(
    <div style={{paddingBottom:82}}>
      <div style={{overflowX:'auto',padding:'12px 16px',display:'flex',gap:6,borderBottom:'1px solid var(--border)'}}>
        {catsWithRuns.map(c=>(
          <button key={c.id} className={`chip${selCat===c.id?' active':''}`}
            style={{flexShrink:0,fontSize:11,...(selCat===c.id?{background:`${c.color}1A`,borderColor:`${c.color}55`,color:c.color}:{})}}
            onClick={()=>{setSelCat(c.id);SFX.hover();}}>{c.name[lang]}</button>
        ))}
      </div>
      {/* Stage selector — only shown when multiple stages have runs */}
      {multiStage&&(
        <div style={{overflowX:'auto',padding:'8px 16px',display:'flex',gap:6,borderBottom:'1px solid var(--border)',background:'rgba(255,255,255,.02)'}}>
          <button className={`chip${selStage===null?' active':''}`} style={{flexShrink:0,fontSize:11,padding:'3px 12px'}}
            onClick={()=>{setSelStage(null);SFX.hover();}}>
            {lang==='de'?'Gesamt':'Overall'}
          </button>
          {stageNums.map(n=>(
            <button key={n} className={`chip${selStage===n?' active':''}`}
              style={{flexShrink:0,fontSize:11,padding:'3px 12px',...(selStage===n?{background:'rgba(255,94,58,.15)',borderColor:'rgba(255,94,58,.4)',color:'var(--cor)'}:{})}}
              onClick={()=>{setSelStage(n);SFX.hover();}}>
              Stage {n}
            </button>
          ))}
        </div>
      )}
      {catsWithRuns.length===0&&<EmptyState icon={<I.FileText s={28} c="rgba(255,255,255,.3)"/>} text={t('noRuns')}/>}

                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',display:'flex',alignItems:'center',gap:5}}>
                    {a.name}{r.protested&&<I.Flag s={11} c="var(--gold)"/>}
                  </div>
                  <div style={{display:'flex',gap:5,alignItems:'center',marginTop:2,flexWrap:'wrap'}}>
                    <span style={{fontSize:10,fontFamily:'JetBrains Mono',color:'var(--muted)'}}>#{a.num}</span>
                    {a.team&&<span style={{fontSize:10,color:'var(--cor2)',fontWeight:700,background:'rgba(255,144,64,.13)',borderRadius:5,padding:'1px 5px'}}>{a.team}</span>}
                    {a.country&&<span style={{fontSize:10,color:'var(--muted)'}}>{toFlag(a.country)} {a.country}</span>}
                  </div>
                  <div style={{marginTop:5,display:'flex',alignItems:'center',gap:5}}>
                    <div style={{flex:1,height:3,background:'rgba(255,255,255,.08)',borderRadius:2,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${(()=>{const done=r.doneCP?.length||0;const tot=Math.max(r.totalCPs||0,done)||1;return(done/tot)*100;})()}%`,background:r.status==='complete'?'var(--green)':'var(--cor)',borderRadius:2}}/>
                    </div>
                    <span style={{fontSize:9,color:'var(--muted)',fontFamily:'JetBrains Mono',flexShrink:0}}>{r.doneCP?.length||0}{r.totalCPs?`/${r.totalCPs}`:''}</span>
                  </div>
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
                  <div className="timer-grad" style={{fontSize:14}}>{r.status==='complete'&&r.finalTime?fmtMs(r.finalTime):t('dnf')}</div>
                  {r.status==='complete'
                    ?<div className="buzzer-badge">⚡ Buzzer</div>
                    :r.fellAt?.name
                      ?<div style={{fontSize:10,color:'var(--red)',fontWeight:600,display:'flex',alignItems:'center',gap:3,maxWidth:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}><I.XCircle s={10} c="var(--red)"/>{r.fellAt.name}</div>
                      :<div style={{fontSize:10,color:'var(--muted)'}}>DNF</div>
                  }
                </div>
              </div>
            );})}
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" style={{flex:1,padding:12,gap:7}} onClick={()=>exportAll('csv')}><I.Download s={15}/> CSV</button>
              <button className="btn btn-ghost" style={{flex:1,padding:12,gap:7}} onClick={()=>exportAll('text')}><I.Share2 s={15}/> {lang==='de'?'Teilen':'Share'}</button>
            </div>
          </div>
        );
      })()}
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// JURY APP (tabbed shell)
// ════════════════════════════════════════════════════════════
const JuryApp=({compId,stNum,onBack})=>{
  const {t,lang,catName}=useLang();
  const [tab,setTab]=useState('jury');
  const info=useFbVal(`ogn/${compId}/info`);
  const globalObstacles=useFbVal(`ogn/${compId}/obstacles`);
  const stageObstaclesRaw=useFbVal(`ogn/${compId}/stages/${stNum}/obstacles`);
  const globalAthletesMap=useFbVal(`ogn/${compId}/athletes`);
  const stageAthletesRaw=useFbVal(`ogn/${compId}/stages/${stNum}/athletes`);
  // Per-stage data overrides global with fallback
  const obstacles=stageObstaclesRaw||globalObstacles;
  const athletesMap=stageAthletesRaw||globalAthletesMap;
  const stData=useFbVal(`ogn/${compId}/stations/${stNum}`);
  const completedRuns=useFbVal(`ogn/${compId}/completedRuns`);
  const [phase,setPhase]=useState('wait');
  const [currentAth,setCurrentAth]=useState(null);
  const [fallModal,setFallModal]=useState(null);   // null or fall data — timer stays running
  const [stopModal,setStopModal]=useState(null);   // null or stop data — timer stays running
  const [activeFalls,setActiveFalls]=useState([]); // committed falls in current run
  const [doneResult,setDoneResult]=useState(null);
  const [lives,setLives]=useState(3);
  const [goTime,setGoTime]=useState(null); // performance.now() captured when GO horn fires
  useEffect(()=>{if(info)setLives(info.lives||3);},[info?.lives]);

  // After run completes: keep stage card on Display for 5s showing result, then clear
  useEffect(()=>{
    if(phase==='done'&&doneResult&&currentAth){
      // Small delay so JuryActive's cleanup (fbRemove) fires first, then we write back
      const tWrite=setTimeout(()=>{
        fbSet(`ogn/${compId}/activeRuns/${stNum}`,{
          athleteId:currentAth.id,athleteName:currentAth.name,catId:currentAth.cat||null,
          phase:'done',status:doneResult.status,finalTime:doneResult.finalTime||null,
          doneCP:doneResult.doneCP||[],fellAt:doneResult.fellAt||null,doneAt:Date.now()
        });
      },200);
      const tRemove=setTimeout(()=>fbRemove(`ogn/${compId}/activeRuns/${stNum}`),5200);
      return()=>{clearTimeout(tWrite);clearTimeout(tRemove);};
    }
  },[phase,doneResult?.timestamp]);

  // Broadcast countdown phase to Firebase so DisplayView shows live countdown on stage card
  useEffect(()=>{
    if(phase==='countdown'&&currentAth){
      fbSet(`ogn/${compId}/activeRuns/${stNum}`,{athleteId:currentAth.id,athleteName:currentAth.name,catId:currentAth.cat||null,phase:'countdown',countdown:3,doneCP:[],livesLeft:lives});
      const t1=setTimeout(()=>fbUpdate(`ogn/${compId}/activeRuns/${stNum}`,{countdown:2}),1000);
      const t2=setTimeout(()=>fbUpdate(`ogn/${compId}/activeRuns/${stNum}`,{countdown:1}),2000);
      return()=>{clearTimeout(t1);clearTimeout(t2);};
    }
  },[phase,currentAth?.id]);

  if(!info||globalObstacles===undefined)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:10}}><Spinner/><div style={{fontSize:12,color:'var(--muted)'}}>Stage {stNum} · {compId}</div></div>
  );

  // ── Inline category picker if no category assigned yet ──
  if(!stData?.cat && stData !== undefined){
    const athList=athletesMap?Object.values(athletesMap):[];
    return(
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
        <TopBar title={`Stage ${stNum}`} sub={compId} onBack={onBack}/>
        <div className="section" style={{flex:1}}>
          <div style={{padding:'24px 0 8px',textAlign:'center'}}>
            <div style={{fontSize:36,marginBottom:8}}>🥷</div>
            <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>Kategorie wählen</div>
            <div style={{fontSize:13,color:'var(--muted)'}}>Welche Kategorie startet auf Stage {stNum}?</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:8}}>
            {IGN_CATS.filter(c=>athList.some(a=>a.cat===c.id)).map(c=>{
              const cnt=athList.filter(a=>a.cat===c.id).length;
              return(
                <button key={c.id} className="sh-card btn fade-up"
                  style={{padding:'14px 16px',textAlign:'left',flexDirection:'row',gap:14,width:'100%',cursor:'pointer'}}
                  onClick={()=>{fbSet(`ogn/${compId}/stations/${stNum}/cat`,c.id);SFX.click();}}>
                  <div style={{width:12,height:12,borderRadius:'50%',background:c.color,flexShrink:0,marginTop:3}}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14}}>{catName(c)}</div>
                    <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{cnt} Athlet{cnt!==1?'en':''}</div>
                  </div>
                  <I.ChevR s={16} c="var(--dim)"/>
                </button>
              );
            })}
            {IGN_CATS.filter(c=>athList.some(a=>a.cat===c.id)).length===0&&(
              <EmptyState icon={<I.User s={28} c="rgba(255,255,255,.3)"/>} text="Noch keine Athleten angelegt. Wettkampf bearbeiten."/>
            )}
          </div>
        </div>
      </div>
    );
  }

  const catId=stData?.cat;const cat=IGN_CATS.find(c=>c.id===catId);
  const athList=athletesMap?Object.values(athletesMap):[];
  const doneIds=new Set(completedRuns?Object.values(completedRuns).filter(r=>r.catId===catId).map(r=>r.athleteId):[]);
  const queue=athList.filter(a=>a.cat===catId&&!doneIds.has(a.id)).sort((a,b)=>(a.queueOrder??999)-(b.queueOrder??999));

  const obstArr=obstacles?Object.values(obstacles).sort((a,b)=>a.order-b.order):[];
  const cpObst=obstArr.filter(o=>o.isCP);

  const handleStart=ath=>{setCurrentAth(ath);setLives(info.lives||3);setActiveFalls([]);setGoTime(null);setPhase('countdown');};
  // goTime = performance.now() at the exact moment the GO horn fired — used as timer origin
  const handleGo=(gt)=>{setGoTime(gt);setPhase('active');};
  // Fall: show modal overlay — JuryActive stays mounted, timer keeps running
  const handleFall=data=>{if(fallModal||stopModal)return;setFallModal(data);};
  const handleStop=data=>{if(fallModal||stopModal)return;setStopModal(data);};
  // "Back to run" — accidental press, no fall recorded
  const handleFallCancel=()=>setFallModal(null);
  const handleStopCancel=()=>setStopModal(null);
  // "Use life & continue" — record fall, decrement lives, close modal, run continues
  const handleUseLive=({selCount,time})=>{
    const newFall={obsIdx:fallModal.pendingFallIdx,time:fallModal.currentTime};
    setActiveFalls(prev=>[...prev,newFall]);
    setFallModal(null);
    setLives(l=>l-1);
  };
  // Confirm DNF
  const handleFallConfirm=async({selCount,time,fellAtObst})=>{
    const corrected=(fallModal.doneCP||[]).slice(0,selCount);
    const finalFalls=[...activeFalls,{obsIdx:fallModal.pendingFallIdx,time:fallModal.currentTime}];
    const result={athleteId:currentAth.id,athleteName:currentAth.name,catId:currentAth.cat,stNum,mode:info.mode,doneCP:corrected,totalCPs:cpObst.length,finalTime:time,lives,falls:finalFalls,protested:fallModal.protested||false,status:'fall',fellAt:fellAtObst?{id:fellAtObst.id,name:fellAtObst.name,order:fellAtObst.order}:null,timestamp:Date.now()};
    await fbSet(`ogn/${compId}/completedRuns/${uid()}`,result);setFallModal(null);setDoneResult(result);setPhase('done');SFX.complete();
  };
  const handleStopConfirm=async({selCount,time,fellAtObst})=>{
    const corrected=(stopModal.doneCP||[]).slice(0,selCount);
    const result={athleteId:currentAth.id,athleteName:currentAth.name,catId:currentAth.cat,stNum,mode:info.mode,doneCP:corrected,totalCPs:cpObst.length,finalTime:time,lives,falls:activeFalls,protested:stopModal.protested||false,status:stopModal.reason||'dnf',fellAt:fellAtObst?{id:fellAtObst.id,name:fellAtObst.name,order:fellAtObst.order}:null,timestamp:Date.now()};
    await fbSet(`ogn/${compId}/completedRuns/${uid()}`,result);setStopModal(null);setDoneResult(result);setPhase('done');SFX.complete();
  };
  const handleComplete=async data=>{
    const result={athleteId:currentAth.id,athleteName:currentAth.name,catId:currentAth.cat,stNum,mode:info.mode,doneCP:data.doneCP||[],totalCPs:cpObst.length,finalTime:data.finalTime,lives:data.lives,falls:activeFalls,protested:data.protested||false,status:'complete',timestamp:Date.now()};
    await fbSet(`ogn/${compId}/completedRuns/${uid()}`,result);setDoneResult(result);setPhase('done');
  };
  const handleNext=()=>{setPhase('wait');setCurrentAth(null);setFallModal(null);setStopModal(null);setActiveFalls([]);setDoneResult(null);setLives(info.lives||3);setGoTime(null);};
  const inRun=phase==='active'||phase==='countdown';

  const juryContent=(()=>{
    if(phase==='countdown')return<JuryCountdown onGo={handleGo}/>;
    if(phase==='active')return<JuryActive compId={compId} stNum={stNum} athlete={currentAth} obstacles={obstacles} info={info} lives={lives} activeFalls={activeFalls} startPerf={goTime} onFall={handleFall} onComplete={handleComplete} onStop={handleStop}/>;
    if(phase==='done')return<JuryDone athlete={currentAth} result={doneResult} cat={cat} onNext={handleNext}/>;
    return<JuryWait cat={cat} queue={queue} obstacles={obstacles} onStart={handleStart} compId={compId}/>;
  })();

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <TopBar title={`Stage ${stNum}`} sub={cat?catName(cat):compId}
        onBack={(!inRun&&onBack)?onBack:undefined}
        right={inRun?<div className="live-badge"><div className="live-dot"/>LIVE</div>:null}/>
      <div style={{flex:1,overflowY:'auto'}}>
        {tab==='jury'&&juryContent}
        {tab==='results'&&!inRun&&<ResultsView compId={compId} athletes={athletesMap}/>}
        {tab==='rules'&&!inRun&&<Regelwerk/>}
      </div>
      {!inRun&&(
        <nav className="tabbar">
          {[{id:'jury',ic:<I.Bolt s={20}/>,lb:t('tabJury')},{id:'results',ic:<I.Trophy s={20}/>,lb:t('tabResults')},{id:'rules',ic:<I.Book s={20}/>,lb:t('tabRules')}].map(tb=>(
            <button key={tb.id} className={`tab-item${tab===tb.id?' active':''}`} onClick={()=>{setTab(tb.id);SFX.hover();}}>{tb.ic}<span>{tb.lb}</span></button>
          ))}
        </nav>
      )}
      {fallModal&&phase==='active'&&(
        <FallModal athlete={currentAth} doneCP={fallModal.doneCP} cpObst={cpObst} obstArr={obstArr} currentTime={fallModal.currentTime}
          mode={info.mode} lives={lives}
          onConfirm={handleFallConfirm}
          onUseLive={(info.mode==='lives'||info.mode==='segliv')&&lives>1?handleUseLive:null}
          onCancel={handleFallCancel}/>
      )}
      {stopModal&&phase==='active'&&(
        <StopModal athlete={currentAth} doneCP={stopModal.doneCP||[]} cpObst={cpObst} obstArr={obstArr} time={stopModal.time} reason={stopModal.reason}
          onConfirm={handleStopConfirm} onCancel={handleStopCancel}/>
      )}
    </div>
  );
};

// DISPLAY VIEW
// ════════════════════════════════════════════════════════════
const DisplayView=({compId,onBack})=>{
  const {lang,catName,t}=useLang();
  const info=useFbVal(`ogn/${compId}/info`);
  const athletesMap=useFbVal(`ogn/${compId}/athletes`);
  const completedRuns=useFbVal(`ogn/${compId}/completedRuns`);
  const activeRuns=useFbVal(`ogn/${compId}/activeRuns`);
  const [catIdx,setCatIdx]=useState(0);const [scrollOff,setScrollOff]=useState(0);const [nowMs,setNowMs]=useState(Date.now());
  const runList=completedRuns?Object.values(completedRuns):[];
  const athMap=athletesMap||{};
  const catsWithData=IGN_CATS.filter(c=>runList.some(r=>r.catId===c.id));
  // Build active run array with stage number attached
  const activeArr=activeRuns
    ?Object.entries(activeRuns).filter(([,r])=>r?.athleteId).map(([stNum,r])=>({stNum,...r}))
    :[];
  useEffect(()=>{if(catsWithData.length<=1)return;const id=setInterval(()=>{setCatIdx(i=>(i+1)%catsWithData.length);setScrollOff(0);},15000);return()=>clearInterval(id);},[catsWithData.length]);
  useEffect(()=>{const id=setInterval(()=>{setScrollOff(off=>{const cat=catsWithData[catIdx];if(!cat)return 0;const total=computeRanked(runList,cat.id).length-3;return total>0?(off+1)%total:0;});},3000);return()=>clearInterval(id);},[catIdx,catsWithData.length,runList.length]);
  useEffect(()=>{let raf;const tick=()=>{setNowMs(Date.now());raf=requestAnimationFrame(tick);};raf=requestAnimationFrame(tick);return()=>cancelAnimationFrame(raf);},[]);
  const medals=['🥇','🥈','🥉'];const medalColors=['#FFD60A','#C0C0C0','#CD7F32'];
  const curCat=catsWithData[catIdx]||null;
  // Per-stage columns: find which stages have runs for current category
  const dispStageNums=curCat?[...new Set(runList.filter(r=>r.catId===curCat.id&&r.stNum!=null).map(r=>r.stNum))].sort((a,b)=>a-b):[];
  const multiDispStage=dispStageNums.length>1;
  // For single-stage or overall, keep current scrolling behavior
  const ranked=curCat?computeRanked(runList,curCat.id):[];
  const top3=ranked.slice(0,3);const visRest=ranked.slice(3).slice(scrollOff,scrollOff+4);
  if(!info)return<div style={{background:'#000',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><Spinner/></div>;
  const cols=activeArr.length>=2?2:1;
  return(
    <div className="display-root">
      {/* ── Header ── */}
      <div style={{padding:'18px 24px 14px',borderBottom:'1px solid rgba(255,255,255,.07)',display:'flex',alignItems:'center',gap:16,background:'radial-gradient(ellipse at 50% -40%,rgba(255,94,58,.07) 0%,transparent 60%)'}}>
        {onBack&&(
          <button onClick={onBack} style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:10,padding:'7px 10px',cursor:'pointer',color:'rgba(255,255,255,.55)',display:'flex',alignItems:'center',gap:5,fontSize:12,fontWeight:600,flexShrink:0,transition:'background .15s,color .15s'}}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,.12)';e.currentTarget.style.color='#fff';}}
            onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,.06)';e.currentTarget.style.color='rgba(255,255,255,.55)';}}>
            <I.ChevL s={16}/>{lang==='de'?'Wettkampf wählen':'Select competition'}
          </button>
        )}
        <div style={{width:40,height:40,borderRadius:11,background:'linear-gradient(135deg,#FF5E3A,#FF9040)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{info.emoji||'🥷'}</div>
        <div style={{flex:1}}><div style={{fontSize:11,color:'rgba(255,255,255,.35)',letterSpacing:'.1em',textTransform:'uppercase'}}>OG Ninja Comp</div><div style={{fontSize:21,fontWeight:900,letterSpacing:'-.5px',marginTop:1}}>{info.name}</div></div>
        <div className="live-badge"><div className="live-dot"/>Live</div>
      </div>

      {/* ── Active Stage Cards (Presenter Mode) ── */}
      {activeArr.length>0&&(
        <div style={{padding:'16px 20px',display:'grid',gridTemplateColumns:`repeat(${cols},1fr)`,gap:16}}>
          {activeArr.map((run)=>{
            const ath=athMap[run.athleteId]||{name:run.athleteName||'?'};

            const catColor=cat?.color||'#FF5E3A';
            return(
              <div key={run.stNum} style={{position:'relative',background:'var(--card)',borderRadius:20,border:`1px solid ${catColor}30`,overflow:'hidden',boxShadow:`0 8px 32px rgba(0,0,0,.4),0 0 0 1px ${catColor}18`}}>
                {/* Accent strip */}
                <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${catColor},${catColor}60)`}}/>
                {/* Countdown overlay */}

                  <div style={{position:'absolute',inset:0,background:'rgba(11,11,20,.94)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:10,borderRadius:20}}>
                    <div className="timer-grad" style={{fontSize:cols===1?150:110,lineHeight:1,letterSpacing:'-6px',animation:'scaleIn .3s cubic-bezier(.16,1,.3,1)'}}>{run.countdown}</div>

                      </>

                        {run.doneCP?.length>0&&<div style={{fontSize:12,color:'rgba(255,255,255,.35)',fontFamily:'JetBrains Mono'}}>{run.doneCP.length} CPs</div>}
                      </>
                    }
                    <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.25)',letterSpacing:'.08em',marginTop:4}}>{ath.name||run.athleteName}</div>
                  </div>

                  {/* Stage + category row */}

                    {ath.photo
                      ?<img src={ath.photo} style={{width:cols===1?68:56,height:cols===1?68:56,borderRadius:'50%',objectFit:'cover',border:`2.5px solid ${catColor}60`,flexShrink:0,boxShadow:`0 4px 16px rgba(0,0,0,.4)`}}/>
                      :<div style={{width:cols===1?68:56,height:cols===1?68:56,borderRadius:'50%',background:`radial-gradient(135deg,${catColor}30,${catColor}10)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:cols===1?28:22,flexShrink:0,border:`2px solid ${catColor}30`}}>🥷</div>
                    }
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:cols===1?26:20,fontWeight:900,letterSpacing:'-.6px',lineHeight:1.15,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{ath.name||run.athleteName}</div>
                      <div style={{fontSize:12,color:'rgba(255,255,255,.45)',marginTop:4,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                        <span style={{fontFamily:'JetBrains Mono'}}>#{ath.num||'?'}</span>
                        {ath.country&&<span style={{background:'rgba(255,255,255,.07)',borderRadius:6,padding:'1px 6px',fontSize:11}}>{toFlag(ath.country)} {ath.country}</span>}
                        {ath.team&&<span style={{color:`${catColor}CC`,fontWeight:600,fontSize:11}}>{ath.team}</span>}
                      </div>
                    </div>
                  </div>
                  {/* Live timer */}
                  <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:lastCP?10:0}}>
                    <div className="live-dot"/>
                    <div style={{fontFamily:'JetBrains Mono',fontSize:cols===1?36:28,fontWeight:700,color:'#FF5E3A',letterSpacing:'-1px'}}>{fmtMs(elapsed)}</div>
                    {run.livesLeft!=null&&run.livesLeft>0&&(
                      <div style={{marginLeft:'auto',display:'flex',gap:4,alignItems:'center'}}>
                        {Array.from({length:run.livesLeft}).map((_,i)=>(
                          <div key={i} style={{width:8,height:8,borderRadius:'50%',background:'var(--green)',boxShadow:'0 0 6px rgba(52,199,89,.6)'}}/>
                        ))}
                      </div>
                    )}
                  </div>
                  {/* Last checkpoint */}
                  {lastCP&&(
                    <div style={{marginTop:6,display:'flex',alignItems:'center',gap:7,padding:'6px 10px',background:'rgba(52,199,89,.08)',borderRadius:10,border:'1px solid rgba(52,199,89,.15)'}}>
                      <span style={{color:'var(--green)',fontSize:14,flexShrink:0}}>✓</span>
                      <span style={{fontSize:12,color:'rgba(255,255,255,.5)',flexShrink:0}}>CP:</span>
                      <span style={{fontSize:13,fontWeight:700,color:'rgba(255,255,255,.85)',flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{lastCP.name||lastCP}</span>
                      <span style={{fontSize:11,color:'rgba(255,255,255,.3)',flexShrink:0,fontFamily:'JetBrains Mono'}}>{run.doneCP.length}×</span>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Rankings ── */}
      {catsWithData.length>1&&(
        <div style={{padding:'10px 20px 0',display:'flex',gap:7,overflowX:'auto'}}>
          {catsWithData.map((c,i)=>(
            <button key={c.id} style={{padding:'5px 14px',borderRadius:20,fontSize:12,fontWeight:700,border:'none',cursor:'pointer',flexShrink:0,background:i===catIdx?c.color:'rgba(255,255,255,.06)',color:i===catIdx?'#fff':'rgba(255,255,255,.4)',transition:'all .4s'}} onClick={()=>{setCatIdx(i);setScrollOff(0);}}>{catName(c)}</button>
          ))}
        </div>
      )}
      {!curCat&&activeArr.length===0&&<div style={{padding:'80px 24px',textAlign:'center'}}><div style={{fontSize:52,marginBottom:14}}>🥷</div><div style={{fontSize:18,color:'rgba(255,255,255,.35)'}}>{lang==='de'?'Noch keine Ergebnisse':'No results yet'}</div></div>}
      {curCat&&(
        <div style={{padding:'18px 20px 40px'}}>
          <div style={{marginBottom:16}}><div style={{display:'inline-flex',alignItems:'center',gap:8,padding:'5px 14px',borderRadius:20,background:`${curCat.color}20`,border:`1px solid ${curCat.color}30`}}><div style={{width:8,height:8,borderRadius:'50%',background:curCat.color}}/><span style={{fontSize:13,fontWeight:700,color:curCat.color}}>{catName(curCat)}</span></div></div>

          {/* ── Multi-stage: columns per stage ── */}
          {multiDispStage?(
            <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(dispStageNums.length,3)},1fr)`,gap:12}}>
              {dispStageNums.map(stN=>{
                const stRanked=computeRankedStage(runList,curCat.id,stN);
                if(!stRanked.length)return null;
                return(
                  <div key={stN} style={{background:'var(--card)',borderRadius:16,border:'1px solid var(--border)',overflow:'hidden'}}>
                    {/* Stage header */}
                    <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8,background:'rgba(255,255,255,.02)'}}>
                      <div style={{width:28,height:28,borderRadius:8,background:'linear-gradient(135deg,var(--cor),var(--cor2))',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:13,color:'#fff',flexShrink:0}}>{stN}</div>
                      <div style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,.6)',letterSpacing:'.06em',textTransform:'uppercase'}}>Stage {stN}</div>
                      <div style={{marginLeft:'auto',fontSize:10,color:'rgba(255,255,255,.3)',fontFamily:'JetBrains Mono'}}>{stRanked.length}</div>
                    </div>
                    {/* Rank rows */}
                    <div style={{padding:'6px 0'}}>
                      {stRanked.slice(0,6).map((r,i)=>{
                        const a=athMap[r.athleteId]||{name:r.athleteName||'?',num:'?'};
                        return(
                          <div key={r.athleteId} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 12px',borderBottom:i<Math.min(stRanked.length,6)-1?'1px solid rgba(255,255,255,.04)':'none'}}>
                            <div style={{fontSize:11,fontWeight:800,color:i===0?medalColors[0]:i===1?medalColors[1]:i===2?medalColors[2]:'rgba(255,255,255,.3)',width:18,textAlign:'center',flexShrink:0}}>{i+1}</div>
                            {a.photo?<img src={a.photo} style={{width:24,height:24,borderRadius:'50%',objectFit:'cover',flexShrink:0}}/>:null}
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:12,fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.country&&<span style={{marginRight:4}}>{toFlag(a.country)}</span>}{a.name}</div>
                              <div style={{fontSize:10,color:'rgba(255,255,255,.3)'}}>{r.doneCP?.length||0} CPs{r.status==='complete'?<span style={{color:'var(--green)',marginLeft:4}}>✓</span>:r.fellAt?.name?<span style={{marginLeft:4,color:'rgba(255,255,255,.25)'}}>{r.fellAt.name.substring(0,12)}</span>:null}</div>
                            </div>
                            <div style={{fontFamily:'JetBrains Mono',fontSize:11,fontWeight:700,color:i===0?medalColors[0]:i===1?medalColors[1]:i===2?medalColors[2]:'rgba(255,255,255,.5)',flexShrink:0}}>{r.status==='complete'&&r.finalTime?fmtMs(r.finalTime):'—'}</div>
                          </div>
                        );
                      })}
                      {stRanked.length>6&&<div style={{padding:'6px 12px',fontSize:10,color:'rgba(255,255,255,.25)',textAlign:'center'}}>+{stRanked.length-6} {lang==='de'?'weitere':'more'}</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          ):(
            /* ── Single stage: original full-ranking view ── */
            <>
              <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:18}}>
                {top3.map((r,i)=>{const a=athMap[r.athleteId]||{name:r.athleteName||'?',num:'?'};return(
                  <div key={r.athleteId} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 18px',borderRadius:16,background:`linear-gradient(135deg,${curCat.color}18,${curCat.color}06)`,border:`1px solid ${curCat.color}28`,animation:`fadeUp .4s ${i*.1}s both`}}>
                    {a.photo?<img src={a.photo} style={{width:36,height:36,borderRadius:'50%',objectFit:'cover',flexShrink:0,border:`1px solid ${curCat.color}40`}}/>:<div style={{fontSize:28,width:40,textAlign:'center'}}>{medals[i]}</div>}
                    <div style={{flex:1}}>
                      <div style={{fontSize:18,fontWeight:800,letterSpacing:'-.3px'}}>{a.name}</div>
                      <div style={{fontSize:11,color:'rgba(255,255,255,.4)',marginTop:2}}>#{a.num}{a.team&&<span style={{marginLeft:6,fontWeight:600,color:'rgba(255,144,64,.8)'}}>{a.team}</span>}{a.country&&<span style={{marginLeft:6}}>{toFlag(a.country)} {a.country}</span>} · {r.doneCP?.length||0} CPs</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      {a.photo&&<div style={{fontSize:22,marginBottom:2}}>{medals[i]}</div>}
                      <div style={{fontFamily:'JetBrains Mono',fontSize:20,fontWeight:700,color:medalColors[i]}}>{r.finalTime?fmtMs(r.finalTime):'—'}</div>
                    </div>
                  </div>
                );})}
              </div>
              {visRest.length>0&&(
                <div style={{display:'flex',flexDirection:'column',gap:5}}>
                  <div style={{fontSize:10,color:'rgba(255,255,255,.25)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:6}}>Positionen {scrollOff+4}–{Math.min(scrollOff+7,ranked.length)}</div>
                  {visRest.map((r,i)=>{const a=athMap[r.athleteId]||{name:r.athleteName||'?',num:'?'};return(
                    <div key={r.athleteId} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 16px',borderRadius:10,background:'rgba(255,255,255,.04)',animation:'fadeUp .3s both'}}>
                      <div style={{fontSize:13,color:'rgba(255,255,255,.35)',width:26,fontWeight:700,textAlign:'center'}}>{scrollOff+4+i}</div>
                      {a.photo?<img src={a.photo} style={{width:28,height:28,borderRadius:'50%',objectFit:'cover',flexShrink:0}}/>:null}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:15,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.name}</div>
                        {(a.country||a.team)&&<div style={{fontSize:10,color:'rgba(255,255,255,.3)',marginTop:1}}>{a.country&&<span>{toFlag(a.country)} {a.country}</span>}{a.team&&<span style={{marginLeft:5,color:'rgba(255,144,64,.6)'}}>{a.team}</span>}</div>}
                      </div>
                      <div style={{fontSize:11,color:'rgba(255,255,255,.35)',flexShrink:0}}>{r.doneCP?.length||0} CPs</div>
                      <div style={{fontFamily:'JetBrains Mono',fontSize:14,color:'rgba(255,255,255,.6)'}}>{r.finalTime?fmtMs(r.finalTime):t('dnf')}</div>
                    </div>
                  );})}
                </div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// DISPLAY — NO COMP SELECTED
// ════════════════════════════════════════════════════════════
const DisplayNoComp=({onSelect})=>{
  const comps=useFbVal('ogn');const list=comps?Object.entries(comps).map(([id,v])=>({id,...v})):[];
  return(
    <div style={{background:'#000',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,padding:24}}>
      <div style={{fontSize:44}}>🥷</div><div style={{fontSize:20,fontWeight:900,color:'#fff'}}>OG Ninja Display</div>
      <div style={{fontSize:13,color:'rgba(255,255,255,.4)',marginBottom:6}}>Wettkampf auswählen</div>
      {list.length===0&&<Spinner/>}
      {list.map(c=>(
        <button key={c.id} style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:12,padding:'12px 28px',color:'#fff',cursor:'pointer',fontSize:15,fontWeight:600,width:'100%',maxWidth:340}} onClick={()=>onSelect(c.id)}>
          {c.info?.name||c.id} <span style={{opacity:.5,fontSize:12}}>{c.id}</span>
        </button>
      ))}
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// INSTALL PROMPT  (Homescreen-Anleitung, einmal wegklickbar)
// ════════════════════════════════════════════════════════════
const InstallPrompt=({lang})=>{
  const de=lang==='de';
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  const isAndroid=/Android/.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone===true||window.matchMedia('(display-mode: standalone)').matches;
  const [show,setShow]=useState(false);
  useEffect(()=>{
    if(isStandalone)return;
    if(storage.get('install-dismissed',false))return;
    if(!isIOS&&!isAndroid)return;
    const t=setTimeout(()=>setShow(true),2000);
    return()=>clearTimeout(t);
  },[]);
  if(!show)return null;
  const iosSteps=[
    {icon:'1️⃣',text:de?'Tippe auf das Teilen-Symbol ⬆️ in der Browser-Leiste unten (Safari)':'Tap the Share icon ⬆️ in the bottom browser bar (Safari)'},
    {icon:'2️⃣',text:de?'Scrolle runter und tippe «Zum Home-Bildschirm»':'Scroll down and tap "Add to Home Screen"'},
    {icon:'3️⃣',text:de?'Tippe oben rechts auf «Hinzufügen» — fertig!':'Tap "Add" in the top right — done!'},
  ];
  const androidSteps=[
    {icon:'1️⃣',text:de?'Tippe auf die drei Punkte ⋮ oben rechts in Chrome':'Tap the three dots ⋮ in the top right of Chrome'},
    {icon:'2️⃣',text:de?'Tippe auf «App installieren» oder «Zum Startbildschirm»':'Tap "Install app" or "Add to Home screen"'},
    {icon:'3️⃣',text:de?'Bestätige mit «Installieren» — fertig!':'Confirm with "Install" — done!'},
  ];
  const steps=isIOS?iosSteps:androidSteps;
  return(
    <div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:300,padding:'0 10px 10px',animation:'slideUp .32s cubic-bezier(.16,1,.3,1)'}}>
      <div style={{background:'#1C1C2E',border:'1px solid rgba(255,94,58,.3)',borderRadius:20,padding:'18px 16px 14px',
        boxShadow:'0 -6px 40px rgba(0,0,0,.65)',maxWidth:520,margin:'0 auto'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:14}}>
          <div style={{width:44,height:44,borderRadius:12,background:'linear-gradient(135deg,#FF5E3A,#FF9040)',
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>🥷</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:15,color:'#fff',letterSpacing:'-.2px',marginBottom:2}}>
              {de?'Als App installieren':'Install as App'}
            </div>
            <div style={{fontSize:12,color:'rgba(255,255,255,.5)'}}>
              {de?`Schneller Zugriff auf dem ${isIOS?'iPhone':'Android'}-Homescreen`
                :`Quick access on your ${isIOS?'iPhone':'Android'} home screen`}
            </div>
          </div>
          <button style={{background:'rgba(255,255,255,.07)',border:'none',borderRadius:8,
            padding:'6px 8px',cursor:'pointer',color:'rgba(255,255,255,.45)',fontSize:15,lineHeight:1,display:'flex'}}
            onClick={()=>setShow(false)}>✕</button>
        </div>
        {/* Steps */}
        <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14}}>
          <div style={{fontSize:11,color:'rgba(255,94,58,.9)',fontWeight:700,letterSpacing:'.1em',
            textTransform:'uppercase',marginBottom:2}}>
            {isIOS?'iPhone / iPad — Safari':'Android — Chrome'}
          </div>
          {steps.map((s,i)=>(
            <div key={i} style={{display:'flex',gap:10,alignItems:'flex-start',
              padding:'9px 12px',borderRadius:11,background:'rgba(255,255,255,.04)',
              border:'1px solid rgba(255,255,255,.06)'}}>
              <span style={{fontSize:16,lineHeight:1.3,flexShrink:0}}>{s.icon}</span>
              <span style={{fontSize:13,color:'rgba(255,255,255,.82)',lineHeight:1.45}}>{s.text}</span>
            </div>
          ))}
        </div>
        {/* Buttons */}
        <div style={{display:'flex',gap:8}}>
          <button style={{flex:1,padding:'11px 8px',borderRadius:11,cursor:'pointer',fontWeight:600,fontSize:12,
            background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',color:'rgba(255,255,255,.45)'}}
            onClick={()=>{storage.set('install-dismissed',true);setShow(false);}}>
            {de?'Nicht mehr anzeigen':'Don\'t show again'}
          </button>
          <button style={{flex:1,padding:'11px 8px',borderRadius:11,cursor:'pointer',fontWeight:700,fontSize:13,
            background:'linear-gradient(135deg,#FF5E3A,#FF9040)',border:'none',color:'#fff',
            boxShadow:'0 4px 16px rgba(255,94,58,.3)'}}
            onClick={()=>setShow(false)}>
            {de?'Verstanden ✓':'Got it ✓'}
          </button>
        </div>
      </div>
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// APP ROUTER
// ════════════════════════════════════════════════════════════
const App=()=>{
  const params=new URLSearchParams(window.location.search);
  const modeP=params.get('mode'),compP=params.get('comp'),stP=params.get('station');
  const [lang,setLang]=useState(()=>storage.get('lang','de'));
  const [compId,setCompId]=useState(compP||null);
  const [stNum,setStNum]=useState(stP?parseInt(stP,10):1);
  const [view,setView]=useState(()=>{if(modeP==='display')return 'display';if(stP&&compP)return 'jury';if(compP)return 'coordinator';return 'home';});
  useEffect(()=>storage.set('lang',lang),[lang]);
  const openComp=id=>{setCompId(id);setView('coordinator');};
  const openStage=n=>{setStNum(n);setView('jury');};
  return(
    <LangCtx.Provider value={lang}>
      {view==='home'&&<HomeView onOpen={openComp} lang={lang} setLang={setLang}/>}
      {view==='coordinator'&&compId&&<CoordinatorView compId={compId} onBack={()=>{setView('home');setCompId(null);}} onStage={openStage} lang={lang} setLang={setLang}/>}
      {view==='jury'&&compId&&<JuryApp compId={compId} stNum={stNum} onBack={()=>setView('coordinator')}/>}
      {view==='display'&&compId&&<DisplayView compId={compId} onBack={()=>setCompId(null)}/>}
      {view==='display'&&!compId&&<DisplayNoComp onSelect={id=>{setCompId(id);setView('display');}}/>}
      {/* Install prompt — only shows on mobile, dismissable, "not again" saves to localStorage */}
      <InstallPrompt lang={lang}/>
    </LangCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
